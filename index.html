  fullScript: `Guide: Welcome, ladies and gentlemen, to the Morecambe Museum of Fashion. Before we go up to the fashion exhibition 'Clothes of the Future', I would like to show you some slides on the screen, and say a few words about the history of fashion. I will also mention some of the important people in fashion. This will provide an introduction for you and will prepare you for the clothes that we're going to see in the exhibition.

As I'm sure you know, nowadays fashion is something that almost everybody enjoys. People of all age groups and all incomes usually have an interest in what they wear. But this has only recently happened, and I will tell you why.
Until the beginning of this century, it was only the rich who could afford to follow fashion. There were no factories to make many copies of the same article, as there are today. Rich men and women wore trousers, jackets and dresses which were made especially for them. This picture here shows a young lady being measured for a dress that she will have made by hand, exactly how she wants it to be. Ladies' clothes in those days were long and usually tight-fitting and made of heavy material.
However, the new century -- the 1900s -- brought new ideas. The important person at this time was Coco Chanel, who started making clothes in 1908, in Paris. Many people think she was the 20th century's most important influence on fashion. Chanel loved to wear loose-fitting clothes and produced jackets and skirts which everyone admired. Here's a picture of one of her ladies' suits. Even today people still wear styles like this when they want to look smart. Young Paris designers all began to produce simple clothes, and skirts started to get shorter.
The idea of special clothes for playing sports also became popular in the early 1920s. Things like long shorts and tennis clothes started to become fashionable. Soon factories produced these new styles more cheaply, and then many more people were able to enjoy fashion.
In 1947, after the second world war, Christian Dior used all the new materials available to produce a fashion which was known as the 'New Look'. As you can see in this picture, he made skirt lengths longer again.
Later, in the 60s, 'flower power' and student fashion were popular. In London, Mary Quant introduced short skirts. These were worn with boots that went up to the knee. Look at the white, shiny boots in this picture!
And now we come to today's exhibition. Some of the clothes you will see today will be very different from anything which you have seen before. The exhibition aims to take a look at the sort of clothes that we might wear in the next 50 years.

David: Well, one thing to remember is that the shops don't open till 10.00 in the morning except on Saturday when they open at 9.00. So don't get there too early on a weekday. They close at 8 o'clock every day except Friday when they're open until 9 pm.

  fullScript: `Now we are ready to start. Listen carefully. You will hear the recording twice.

Woman: Right, everyone - about the trip to the Jubilee Arts Centre next Wednesday. As you know, we have tickets for the Centre's two theatres and the concert hall. Those of you with concert tickets will hear piano music by Chopin and Schumann. Those with tickets for the main theatre will see Shakespeare's Twelfth Night, while people going to the smaller theatre will see The Wild Duck by Ibsen. Although all the theatre and concert tickets have gone, if anyone else would like to join us on the trip I can get tickets for the Arts Centre cinema to see the Australian comedy film, Spider and Rose.

After the shows the coach will pick us up at the Bridge Street exit. Everyone should be there by twenty past ten. The two plays will finish at around 10.10 or 10.15. I'm afraid concert-goers will have to wait, as the concert finishes earlier, at ten to ten.

  fullScript: `Now we are ready to start. Listen carefully. You will hear the recording twice.

Man: And today I'm talking to Angela Morgan. Angela, what made you decide to fly round the world in a helicopter?

Woman: People often ask me why I decided to do it but I'm surprised they don't ask 'Why did you wait so long?' because I'm 57 now! I'm sorry I didn't do it years ago, because it was such a wonderful experience. But the main purpose for going was to collect £500,000 for sick children by getting different companies to pay us money for each kilometre that we flew.

Man: And now everyone calls you the flying grandmother!

Woman: Yes, the thing about growing older is that you don't feel any different inside, so you have to do as much as you can while you can. I'm healthy, and my own children are grown up, so I was free to go.

Man: And what about preparing for the trip?

Woman: Well, it took five months to plan. I was going to go with my husband, but he couldn't take time off work. Instead I made the trip with my flying teacher who became a great friend while she was teaching me to fly three years ago. I passed my flying test after two weeks; found it quite easy.

Man: And what was the trip like?

Woman: It was really exciting flying over so many different countries. The only thing was that we weren't able to spend much time sightseeing because we only stopped to get water and to camp. We took very little with us, but we did have tents and cooking things to use at night. We had to spend two days in Thailand because of an engine problem, but that was the longest we spent anywhere. Fortunately nothing else went wrong, so we just kept on going after that.

Man: What did you enjoy most about the trip?

Woman: The most wonderful thing about flying was seeing the differences in the countryside as we flew across 26 countries in 97 days. We flew over oceans and close to mountains; sometimes it was quite frightening, but we didn't travel when it was dark. We spent several nights camping in the desert and the sky was just full of stars. I made a video of the trip; you'll see it in a minute.

Man: Was there anything that you missed while you were away?

Woman: Well, to my surprise I didn't miss going to work or going out to restaurants or films. The most difficult thing was sitting still all the time; I normally play tennis and swim several times a week, so I started to feel very unfit. I missed hot water and proper showers sometimes too, but not as much as I thought I would!

----------------------------------------
BẢN DỊCH TIẾNG VIỆT

Bây giờ chúng ta đã sẵn sàng để bắt đầu. Lắng nghe một cách cẩn thận. Bạn sẽ nghe đoạn ghi âm hai lần.

Người đàn ông: Và hôm nay tôi đang nói chuyện với Angela Morgan. Angela, điều gì khiến bạn quyết định bay vòng quanh thế giới bằng trực thăng?

Người phụ nữ: Mọi người thường hỏi tôi tại sao tôi lại quyết định làm điều đó nhưng tôi ngạc nhiên là họ không hỏi 'Tại sao bạn lại đợi lâu như vậy?' bởi vì bây giờ tôi 57 tuổi! Tôi xin lỗi tôi đã không làm điều đó nhiều năm trước, bởi vì đó là một trải nghiệm tuyệt vời. Nhưng mục đích chính của việc đi là quyên góp 500.000 bảng Anh cho trẻ em bị bệnh bằng cách kêu gọi các công ty khác nhau trả tiền cho chúng tôi cho mỗi km mà chúng tôi đã bay.

Người đàn ông: Và bây giờ mọi người gọi bạn là bà bay!

Người phụ nữ: Vâng, vấn đề của việc già đi là bạn không cảm thấy bất kỳ sự khác biệt nào bên trong, vì vậy bạn phải làm càng nhiều càng tốt trong khi bạn có thể. Tôi khỏe mạnh, con cái cũng đã lớn nên tôi được tự do đi lại.

Người đàn ông: Còn việc chuẩn bị cho chuyến đi thì sao?

Người phụ nữ: Chà, phải mất năm tháng để lên kế hoạch. Tôi định đi cùng chồng nhưng anh ấy không xin nghỉ làm được. Thay vào đó, tôi thực hiện chuyến đi với giáo viên bay của mình, người đã trở thành một người bạn tuyệt vời khi cô ấy dạy tôi bay ba năm trước. Tôi đã vượt qua bài kiểm tra bay sau hai tuần; thấy nó khá dễ dàng.

Người đàn ông: Và chuyến đi như thế nào?

Người phụ nữ: Thật thú vị khi bay qua rất nhiều quốc gia khác nhau. Chỉ có một điều là chúng tôi không thể dành nhiều thời gian tham quan vì chỉ dừng lại lấy nước và cắm trại. Chúng tôi mang theo rất ít, nhưng chúng tôi có lều và đồ nấu ăn để dùng vào ban đêm. Chúng tôi phải ở Thái Lan hai ngày vì trục trặc động cơ, nhưng đó là khoảng thời gian dài nhất chúng tôi ở bất cứ đâu. May mắn thay không có gì khác xảy ra, vì vậy chúng tôi cứ tiếp tục sau đó.

Người đàn ông: Bạn thích điều gì nhất trong chuyến đi?

  fullScript: `Now we are ready to start. Listen carefully. You will hear the recording twice.

Turning to the kitchen, Cooking for one, by Adrian White, says on its cover that even people who hate cooking will find it useful. A month ago, I couldn't even boil an egg, but now I'm producing all sorts of dishes, some quite difficult, and, yes, they taste quite good, too. I'm actually enjoying cooking now. I'm now going to try a new book about cooking Italian food.

The last book this week is Holidays in Europe, by Mary Curtis. This is an enjoyable read, which will start your imagination working as you plan for next year's holiday. It doesn't matter that the writer doesn't talk about the famous places everyone visits, but describes lots of small places away from the main tourist areas. The maps are too small to be useful but the book is still good value for money.

That's it for this week, then. Next week, there's a special report on giving books as presents, so if you've saved up your money and you're wondering what to get for a friend or relation for their birthdays, you might get some good ideas ... I'll look forward to talking to you then ...

  fullScript: `Man: People always ask me why I only travel the hard way! A lot of television travel programmes are about relaxing holidays on the beach, but I've only ever made documentaries about really long trips. The last trip I did was a 50,000-mile journey around the Pacific Ocean, and it took 12 months. But then my very first trip was a 'round the world' journey, and the most difficult one was probably a car journey from the North Pole to the South Pole!

As you can imagine, I've seen a lot of the world! I'm lucky to be in really excellent health, but life is very short and I've done so much travelling that I want a change. Travelling long distances makes you extremely tired, and although it's still a great pleasure for me, I want to do something more relaxing now.

I think my next television series might be made nearer England. There's some really interesting work going on in Wales, where they've just found what remains of a 2,000-year-old town. Or I might do something about farms in France, or even cycling in Holland. There's always something to film if you look hard enough!

But I hope the programmes I've made about the really long trips will encourage other people to get on a plane and have some adventures. Some people seem to be afraid of going to a strange country and perhaps being ill there, but maybe they realise now that if I can do these trips, so can they. I'm only a very ordinary person. And obviously, you don't have to travel on your own as I always have.

I must say that until recently I hadn't ever worried about being so far from home even when the children were very small. But while I was filming in Borneo last year my wife had to have an emergency operation, and it really frightened me because I couldn't get back to England. Everything was fine in the end -- but I wouldn't want to be so far away if anything like that happened to my family again.

Perhaps if I spend more time at home I can do more writing. I've done two books so far. I write about places I've seen and my feelings about them. I don't think I'll ever write fiction or poetry, but I'd be interested in writing newspaper articles. My family says I'm very difficult to live with when I'm writing at home ... perhaps that's why they've never complained about me travelling!

Như bạn có thể tưởng tượng, tôi đã nhìn thấy rất nhiều thế giới! Tôi may mắn có được sức khỏe thực sự tuyệt vời, nhưng cuộc sống rất ngắn ngủi và tôi đã đi du lịch quá nhiều nên tôi muốn thay đổi. Đi du lịch đường dài khiến bạn vô cùng mệt mỏi, và mặc dù đó vẫn là một niềm vui lớn đối với tôi, nhưng tôi muốn làm điều gì đó thư giãn hơn bây giờ.

Tôi nghĩ rằng bộ phim truyền hình tiếp theo của tôi có thể được thực hiện gần nước Anh hơn. Có một số công việc thực sự thú vị đang diễn ra ở xứ Wales, nơi họ vừa tìm thấy những gì còn sót lại của một thị trấn 2.000 năm tuổi. Hoặc tôi có thể làm điều gì đó về các trang trại ở Pháp, hoặc thậm chí đạp xe ở Hà Lan. Luôn có thứ gì đó để quay nếu bạn chịu khó tìm kiếm!

Nhưng tôi hy vọng những chương trình tôi đã thực hiện về những chuyến đi thực sự dài sẽ khuyến khích những người khác lên máy bay và có một vài cuộc phiêu lưu. Một số người dường như sợ đến một đất nước xa lạ và có thể bị ốm ở đó, nhưng có lẽ bây giờ họ nhận ra rằng nếu tôi có thể thực hiện những chuyến đi này, thì họ cũng có thể. Tôi chỉ là một người rất bình thường. Và rõ ràng là bạn không cần phải tự mình đi du lịch như tôi vẫn thường làm.

Tôi phải nói rằng cho đến gần đây, tôi chưa bao giờ lo lắng về việc xa nhà ngay cả khi các con còn rất nhỏ. Nhưng khi tôi quay phim ở Borneo năm ngoái, vợ tôi phải mổ khẩn cấp, và tôi thực sự lo sợ vì không thể quay lại Anh. Cuối cùng thì mọi thứ đều ổn -- nhưng tôi không muốn ở quá xa nếu bất cứ điều gì tương tự lại xảy ra với gia đình tôi.

  fullScript: `Now we are ready to start. Listen carefully. You will hear the recording twice.

Man: Britta, you're English, but you live in Berlin. Have you lived here for a long time?

Woman: Well, I was born in England, but I've lived in Germany for the past twenty years. I arrived in Berlin about four years ago. Before that, I lived in Bonn for six years, but I work as a journalist, and when the newspaper moved to Berlin, I moved with them.

Man: Were you pleased to come to Berlin?

Woman: Yes, I was. I was looking forward to being in a big city like Berlin. Bonn was quite a lot smaller, so I love the busy atmosphere and all the cultural entertainments here: museums, theatres and so on. The only thing I don't like is the traffic; it's a bit noisy in the mornings. It wakes me up about 6.30, but most days I have to get up early anyway!

Man: Where do you live in Berlin?

Woman: I have a flat in the old part of the city. It's right in the centre, and it's not too expensive - it costs me about 500 a month. My street is becoming very popular: there are lots of new art galleries, and small cafes and friendly restaurants everywhere. Eating out in Berlin is fun, and it's cheap, so it's something I do quite often.

Man: How do you find transport in Berlin?

Woman: Well, the transport system here is very good, so I have a tram and bus ticket, but in fact, most of the time I cycle. Travel here is much cheaper than in other countries I know - perhaps that's why people don't walk very much!

Man: What do you like to do in Berlin at the weekends?

Woman: Well, I like art, so sometimes I go to one of the galleries. I have a nephew called Philippe. He's only three but he likes coming with me. He likes the cafe best, I think. And it's a change from going to the park - that's something he does very often. He usually comes out with me while his parents go shopping.

Man: Do you miss your friends and family in England?

Woman: I don't really miss England - most of my friends are here. I don't see much of my work colleagues socially, but I've got some very good friends who live in the same street as me. I enjoy meeting people, and I find Berlin is a very friendly city.

Man: Thank you for talking to us, Britta.

----------------------------------------
BẢN DỊCH TIẾNG VIỆT

Bây giờ chúng ta đã sẵn sàng để bắt đầu. Lắng nghe một cách cẩn thận. Bạn sẽ nghe đoạn ghi âm hai lần.

Người đàn ông: Britta, bạn là người Anh, nhưng bạn sống ở Berlin. Bạn đã sống ở đây trong một thời gian dài?

Người phụ nữ: Chà, tôi sinh ra ở Anh, nhưng tôi đã sống ở Đức trong hai mươi năm qua. Tôi đến Berlin khoảng bốn năm trước. Trước đó, tôi đã sống ở Bonn trong sáu năm, nhưng tôi làm việc với tư cách là một nhà báo, và khi tờ báo chuyển đến Berlin, tôi đã chuyển đến cùng với họ.

Người đàn ông: Bạn có vui khi đến Berlin không?

Người phụ nữ: Vâng, tôi đã. Tôi rất mong được ở một thành phố lớn như Berlin. Bonn nhỏ hơn rất nhiều, vì vậy tôi thích bầu không khí nhộn nhịp và tất cả các hoạt động giải trí văn hóa ở đây: bảo tàng, nhà hát, v.v. Điều duy nhất tôi không thích là giao thông; đó là một chút ồn ào vào buổi sáng. Nó đánh thức tôi dậy khoảng 6h30, nhưng hầu hết các ngày tôi đều phải dậy sớm!

Người đàn ông: Bạn sống ở đâu ở Berlin?

Người phụ nữ: Tôi có một căn hộ ở khu cũ của thành phố. Nó ở ngay trung tâm và không quá đắt - tôi mất khoảng £500 một tháng. Con phố của tôi đang trở nên rất nổi tiếng: có rất nhiều phòng trưng bày nghệ thuật mới, quán cà phê nhỏ và nhà hàng thân thiện ở khắp mọi nơi. Đi ăn ở Berlin rất thú vị và rẻ, vì vậy đó là điều tôi làm khá thường xuyên.

Người đàn ông: Làm thế nào để bạn tìm thấy phương tiện giao thông ở Berlin?

Người phụ nữ: Vâng, hệ thống giao thông ở đây rất tốt, vì vậy tôi có vé xe điện và xe buýt, nhưng trên thực tế, hầu hết thời gian tôi đạp xe. Du lịch ở đây rẻ hơn nhiều so với ở các quốc gia khác mà tôi biết - có lẽ đó là lý do tại sao mọi người không đi bộ nhiều!

Người đàn ông: Bạn thích làm gì ở Berlin vào cuối tuần?

Người phụ nữ: Chà, tôi thích nghệ thuật, vì vậy đôi khi tôi đến một trong các phòng trưng bày. Tôi có một người cháu tên là Philippe. Anh ấy chỉ mới ba tuổi nhưng anh ấy thích đi cùng tôi. Anh ấy thích quán cà phê nhất, tôi nghĩ vậy. Và đó là một sự thay đổi từ việc đi đến công viên - đó là điều anh ấy làm rất thường xuyên. Anh ấy thường đi chơi với tôi trong khi bố mẹ anh ấy đi mua sắm.

Người đàn ông: Bạn có nhớ bạn bè và gia đình ở Anh không?

Người phụ nữ: Tôi không thực sự nhớ nước Anh - hầu hết bạn bè của tôi đều ở đây. Tôi không gặp nhiều đồng nghiệp của mình về mặt xã giao, nhưng tôi có một số người bạn rất tốt sống cùng phố với tôi. Tôi thích gặp gỡ mọi người và tôi thấy Berlin là một thành phố rất thân thiện.

Người đàn ông: Cảm ơn bạn đã nói chuyện với chúng tôi, Britta.`,

  fullScript: `Now we are ready to start. Listen carefully. You will hear the recording twice.

Woman: Frank, tell us about some of the ships you've discovered.

Man: Well, there's nothing quite like finding your first old ship - it was 300 years old. It was just lying at the bottom of the sea, so it wasn't difficult to find. Most are covered in sand and rocks - but this one wasn't.

I'm actually a teacher, not a full-time diver - I dive in my free time but I often get to them before the professional divers, because I have good up-to-date equipment. Another thing that helps is talking to fishermen who tell me about their local area. I've even written a book about some of their experiences.

At the moment, I'm looking for the gold from a ship called The Seabird. It was an enormous well-built ship and it was coming from Australia on a winter night in 1859. Everything was going fine until the ship reached the English coast, when it crashed into some rocks in a very strong wind and sank to the bottom of the sea. It was carrying gold from Australia, and most of it is still at the bottom of the sea.

My wedding ring is actually made from gold which I found on an eighteenth-century sailing ship. A friend of mine, another diver, has already found £88,000 worth of gold from different ships. He's now decided to give up his job and become a full-time diver.

My house is full of things like coins, bottles and old guns. My wife is always complaining about the number of objects around the house - she says I should open an antiques shop - but I love all these old things. Anyway, in the end, I gave some things from my collection to museums, because I didn't want to sell them. But my wife still wasn't very pleased, I'm afraid.

As diving is a dangerous hobby, it's not a good idea to try to teach yourself. I'd advise anyone interested to do what I did. There are some excellent diving clubs like the one I joined, which run courses for beginners. It is best to do one of these before you go on a diving holiday ...

BẢN DỊCH TIẾNG VIỆT

Tôi thực sự là một giáo viên, không phải là một thợ lặn toàn thời gian - tôi lặn trong thời gian rảnh nhưng tôi thường đến với họ trước các thợ lặn chuyên nghiệp, bởi vì tôi có thiết bị tốt hiện đại. Một điều hữu ích khác là nói chuyện với những ngư dân cho tôi biết về khu vực địa phương của họ. Tôi thậm chí đã viết một cuốn sách về một số trải nghiệm của họ.

Hiện tại, tôi đang tìm vàng từ một con tàu tên là The Seabird. Đó là một con tàu khổng lồ được đóng chắc chắn và nó đến từ Úc vào một đêm mùa đông năm 1859. Mọi việc diễn ra suôn sẻ cho đến khi con tàu đến bờ biển Anh, khi nó va phải một số tảng đá trong một cơn gió rất mạnh và chìm xuống đáy biển. Nó chở vàng từ Australia, và phần lớn số vàng này vẫn nằm dưới đáy biển.

  fullScript: `Now we are ready to start. Listen carefully. You will hear the recording twice.

Man: Rachel, tell us how your shows for children started. You studied art at college, didn't you?

Woman: That's right. But I gave up my career as an artist when my twin daughters were born. Painting took up too much time when I was looking after them. I thought about teaching art classes part-time, but instead I started making dolls for my daughters. I love acting, so I often invented little plays for the dolls, doing the voices myself.

Man: And when did you start doing shows for other people?

Woman: When our daughters were five, my husband suggested using the dolls to entertain the children at their birthday party. I wrote a little show and he built a dolls' theatre. My daughters and their friends loved it. As a result, other parents asked me to come and do the show at their children's parties. That's how it all began.

Man: It must be a lot of work for you?

Woman: Yes. I love making the dolls, but I decided that I needed someone to help me with the shows. Luckily my neighbour, Lena, was keen to perform with me. Her husband records the music to go with the shows. It would be impossible to do everything on my own.

Man: Have you ever had any problems?

Woman: Only once. I did a show for a group of three-year-olds, and I'd written a story about a lion. Unfortunately, the children were really afraid of the lion and started crying. I was worried the parents might complain, but luckily they were all able to laugh about it afterwards.

Man: And what did you learn from that?

Woman: The experience taught me that I had to find out beforehand just what children enjoy. Like me, Lena has two daughters, so whenever we've invented a new story, we show it to our four girls first. They always tell us exactly what they think of it. And sometimes I take new dolls to the local primary school to check that children like them.

Man: And the shows continue to be successful?

Woman: They do. I have a range of different shows for five to nine-year-olds. In fact, the shows have become so successful I could do one every day, but I don't want to do that. The reason the shows have become popular, I think, is because I love every minute of every show, and so other people love them too. I certainly didn't realise when I organised that birthday party for my daughters all those years ago that it would change my life so much!

----------------------------------------
BẢN DỊCH TIẾNG VIỆT

Bây giờ chúng ta đã sẵn sàng để bắt đầu. Lắng nghe một cách cẩn thận. Bạn sẽ nghe đoạn ghi âm hai lần.

Người đàn ông: Rachel, hãy cho chúng tôi biết chương trình dành cho trẻ em của bạn đã bắt đầu như thế nào. Bạn học nghệ thuật ở trường đại học, phải không?

Người phụ nữ: Đúng vậy. Nhưng tôi đã từ bỏ sự nghiệp nghệ sĩ của mình khi hai đứa con gái sinh đôi của tôi chào đời. Việc vẽ tranh chiếm quá nhiều thời gian khi tôi chăm sóc chúng. Tôi đã nghĩ đến việc dạy bán thời gian các lớp nghệ thuật, nhưng thay vào đó, tôi bắt đầu làm búp bê cho các con gái của mình. Tôi thích diễn xuất, vì vậy tôi thường sáng tạo ra những vở kịch nhỏ cho búp bê, tự mình lồng tiếng.

Người đàn ông: Và bạn bắt đầu biểu diễn cho người khác từ khi nào?

Người phụ nữ: Khi con gái của chúng tôi lên năm, chồng tôi đề nghị sử dụng những con búp bê để giải trí cho bọn trẻ trong bữa tiệc sinh nhật của chúng. Tôi đã viết một chương trình nhỏ và anh ấy đã xây dựng một nhà hát búp bê. Con gái tôi và bạn bè của họ yêu thích nó. Kết quả là, các bậc cha mẹ khác đã yêu cầu tôi đến biểu diễn tại các bữa tiệc của con cái họ. Đó là cách tất cả bắt đầu.

Người đàn ông: Nó phải là rất nhiều công việc cho bạn?

Người phụ nữ: Vâng. Tôi thích làm búp bê, nhưng tôi quyết định rằng tôi cần ai đó giúp tôi trong các buổi biểu diễn. May mắn thay, người hàng xóm của tôi, Lena, rất muốn biểu diễn cùng tôi. Chồng cô ấy thu âm nhạc để đi cùng với các buổi biểu diễn. Sẽ không thể làm mọi thứ một mình.

Người đàn ông: Bạn đã bao giờ có bất kỳ vấn đề gì chưa?

  fullScript: `Now we are ready to start. Listen carefully. You will hear the recording twice.

Woman: With us today, to tell us about his trip across Africa, is the biologist Paul Hart.

Man: We started on the east coast and travelled on foot across Africa to Gabon in the west, collecting plants and flowers along the way. It wasn't easy, but my route crossed a region rich in plants and I chose it because it won't stay that way for long when more roads are built. It was my only chance to get important information about the natural life of the area.

I had a team of eleven scientists. We walked from six in the morning, but the forest was so thick it took hours to cut our way through it, and some days we only walked one kilometre before dark. Fortunately, we carried special equipment that was very light and we took as little food as possible. But we were always tired when we put the tents up at night.

Sometimes we saw elephants or lions. They were amazing to watch and never attacked us. Every day, I collected plants and added to my notes. There was so much new information to write down. There were, of course, some low points, especially when I got anxious about the team. It was my job to make sure everyone got home safely.

Towards the end of the trip, I suddenly discovered one day that the food had nearly all gone. It was strange because we'd brought enough dried food with us to last the trip -- food that wouldn't ever go bad -- and we'd stopped at villages for fresh food too. But then I found that some of the team had eaten much more than they were supposed to. I was angry with them because it was a silly thing to do.

Then we started walking again. There were no maps for the area, but we had a local guide. Then one of the team got sick and we couldn't go any further. We let him rest, but he got much worse. Thankfully his life was saved by a fisherman who came along the river in a boat and took him to a doctor in the nearest village.

Finally, I returned home, and I'm back with my family and friends. I really missed them while I was away. But I learnt so much on the trip and I'm really glad I went. I was asked to go on another trip -- this time to Australia -- but I said that I couldn't because I'm busy here in London. And I think I've done enough travelling.

  fullScript: `Now we are ready to start. Listen carefully. You will hear the recording twice.

Interviewer: And today in the studio we have a familiar face on television, Angela Bond, the news reporter. Angela, your job has taken you all over the world, hasn't it?

Angela: Yes. I've reported from a number of countries in Asia and I've just returned from the United States. I must say, it's good to be able to unpack my suitcase now that the job has brought me to Britain for at least six months.

Interviewer: Is the travelling what you enjoy about the job?

Angela: It's certainly interesting, but it can be annoying never knowing where I'm going to be next week! For me, the really exciting thing is being somewhere when a big news story is taking place and seeing it develop. Sometimes that can be quite dangerous, but all jobs have their disadvantages! And travelling gives me the chance to collect souvenirs.

Interviewer: What kind of things?

Angela: Mostly things for my flat. I'm mad about anything Chinese and so when I was in Hong Kong, I got a really nice table and some chairs - and in Turkey I spend a lot of money on carpets. Then I've got pictures and other bits of art from Thailand and India. The flat's getting a bit crowded!

Interviewer: It sounds colourful! Do you have a regular working day?

Angela: Not really. At the moment I'm one of the team that reads the evening news, so sometimes I'm on at six thirty, and sometimes at ten o'clock. But that's at the end of the day. It all starts in the morning at eight thirty when I phone the office to see what has happened and what they want me to go and report on.

Interviewer: So you don't have much time for a social life?

Angela: It's better now I'm in London and can see my boyfriend more often. My sister introduced us. He came round for dinner when I was staying with her a year ago. We have a lot in common. He's a lawyer and I studied law at university. Also we've found that we lived in Hong Kong at the same time, although we never met.

Interviewer: What do you like to do in your free time?

Angela: Well, cooking is something new I'm trying because I can't do it when I'm travelling. But I'm not very good at it yet so I find it a bit stressful. One of the best things I've bought recently was a boat and when I want to feel calm and peaceful I go for a sail on the river. It never fails!

Interviewer: Angela - thanks.

----------------------------------------

  fullScript: `Now we are ready to start. Listen carefully. You will hear the recording twice.

Interviewer: Oh, what a wonderful view! I'm here with Jack Williams, who's telling me about his home town of Swanton.

Jack: Yes, the top of this hill is the best place to see the area. Swanton is on the coast - you can see the harbour from here - but in fact the town is built along the river Dean. This river comes from a lake in the mountains, over there in the distance, then flows down to the flat land below us where the town is built.

Interviewer: What do you most like about living here?

Jack: About Swanton? Oh, it's an important industrial town and a port, so there's lots of activity. And there's a forest behind the town with interesting wildlife. But the most exciting thing for me is the mountains. I go climbing whenever I get the chance.

Interviewer: What about entertainment?

Jack: There's plenty of entertainment. A big centre was built last year to encourage the arts - very modern. It's got a cinema, a theatre and an art gallery. And there's football. The local team hasn't done so well lately. A few years ago we nearly won the Cup. And our area is famous for music - not in Swanton itself, but there's a well-known music festival in the next town.

Interviewer: But there are problems with the environment.

Jack: We're working on that. The river was a great place for fish, but the water got so polluted by the factories that most of the fish disappeared. Well, we've cleaned the river up now, and the fish are starting to come back. But I'm unhappy about Swanton woods. The trees are quite healthy, but if you look, there are no birds there, and that's because pollution has reduced the number of insects.

Interviewer: Swanton's growing fast. Are you pleased about the way it's changed?

Jack: You've got to move with the times. It was completely different when I was a boy. In those days everybody worked in the factories, and the families all knew each other. Maybe it was a little boring. Today there are hundreds of different companies, and so many new houses that some people don't even know their neighbours. There are disadvantages, but it's impossible to be bored with all the things going on.

Interviewer: And what about Swanton's future?

Jack: Education is important to us. We have a fine university, which specialises in advanced technology. And a huge shopping centre, just built, which is bringing in double the number of visitors - good news for us. And last year we improved our airport, so more planes can come in.

  fullScript: `Now we are ready to start. Listen carefully. You will hear the recording twice.

Interviewer: My guest today is the star of the London Ballet Company, twenty-two-year-old Elena Karpov. Elena, you were born in Bulgaria. Did you always want to be a dancer?

Elena: Well, I was a very lively little girl, so at the age of seven my mother sent me to gymnastics classes. When I was nine, I went on to ballet lessons and from that moment I knew that I wanted to spend my life dancing. Two years later, when I was eleven, I won a place at the New York Ballet School.

Interviewer: So you had to move to the United States. Did you miss your family?

Elena: Oh yes. At first it was difficult being away from home and not knowing a lot of English. But it taught me how to look after myself and not to depend on others. There were other Bulgarian students there, and we actually found it quite easy to learn enough English to take part in the lessons with the other students.

Interviewer: Tell us about your latest role with the London Ballet Company.

Elena: I'm going to dance the part of Cinderella. It's a story about a poor girl who marries a handsome prince. My parents used to read it to me when I was little. I'd never seen the ballet before, but I already knew the music really well. I'm sure children will love the ballet.

Interviewer: What do you do when you're not practising or performing?

Elena: Before I joined this company I spent two weeks going round London as a tourist. I don't have time for sightseeing now, but I love trying on the latest fashions with my friends. I'm always buying new jeans and trainers! I'm not too keen on discos and nightclubs - I dance enough during the day!

Interviewer: You must have lots of fans.

Elena: Quite a few! They always ask for a photograph of me, but unfortunately I don't have many to give away. I sometimes sign their programmes instead, and if I can I give them one of the flowers I've received from the audience. They always ask for tickets, but of course that's not possible.

Interviewer: What's been the best thing that's happened in your career so far?

Elena: Well, I've been a guest dancer with ballet companies in Moscow and Vienna, and I appeared twice on television in Bulgaria and met the president! I shall never forget that! But the most satisfying thing for me is that I'm paid for doing what I really enjoy - dancing!

  fullScript: `Now we are ready to start. Listen carefully. You will hear the recording twice.

Woman: Hello, I'm Sarah Brown, and I'm here to tell you about my job as a weather forecaster.

I've been a weather forecaster for a television company for seven years, and two years ago I became the head of the weather department. Now, I divide my time equally between presenting weather forecasting on television and managing the weather department which has a staff of eleven. At thirty years old I'm the youngest ever head of weather and the first woman to do the job.

Since our news and weather service goes out all round the world, we all take turns to work at night. I prefer that to doing the show when I have to get up at four in the morning. I normally work an eight-hour day and in that time I do ten or twelve forecasts.

My husband and I try to have the same free days, but neither of us has a regular pattern of work. He's a pilot on long-distance flights, so although he works hard he has a lot more time at home than I do. We moved to our present house about a year ago, and he's enjoying painting it.

Because I'm on world news, people sometimes recognise me in really distant places. Once, in an Indian village, an old man took me to have my photo taken with all his family. I get some lovely letters - one person wrote to say that my smile made her feel happy all day. People occasionally even write and ask me to marry them!

  fullScript: `Now we are ready to start. Listen carefully. You will hear the recording twice.

Int: Today I'm with Robin Marshall, who has just written a book about travelling in Argentina. Robin, tell us about yourself...

Robin: Well. I've travelled to South America a lot for my work and I know Argentina well now. So well that I could be a tour guide if I wanted! I speak fluent Spanish, so I don't need anyone to translate for me. My job involves travelling around selling products for my company. I meet a lot of people doing that, and I wanted to share those experiences with others, so I decided to try writing.

Int: So, tell us about your last visit to Argentina. What was the weather like?

Robin: Well, it was winter there, so mornings were cold, but I'd expected that. Every day they said on the radio that it would be sunny later and sure enough, it was! I wanted to go sightseeing, and the weather was perfect for that.

Int: And where did you go when you went sightseeing?

Robin: Well, I went to a wonderful market that sold everything from modern art to old records of traditional music, which I collect. I came home with a beautiful painting of the mountains. I also saw a wonderful antique chair, but unfortunately it was too big to bring back.

Int: Now, Argentina is famous for its dancing. Did you see any performances during your trip?

Robin: I did, yes. It reminded me of when I used to attend dance classes. I enjoyed them although I was never very good. I'm sure my teacher was pleased when I said I wasn't going to continue! But these dancers made it look so easy that at that moment I felt like joining in and dancing with them.

Int: It sounds wonderful! And what else did you do?

Robin: Well, I went to a small village on the coast. I took the bus there, and got a room in a small hotel. The hotel owner was very friendly. He took me down the river in his boat. It was very beautiful - you could see the forest in the distance.

Int: Do you have a favourite place in Argentina?

Robin: Definitely. It's a mountain near Buenos Aires. It's famous for its spectacular scenery. But when I went there it was very misty and the sun was just rising. You couldn't see much: there were no birds or animals about. It was totally quiet, and I loved that. I shall go back one day.

Int: We look forward to reading your book. Thank you, Robin.

Robin: Thank you.

  fullScript: `Now we are ready to start. Listen carefully. You will hear the recording twice.

Int: Harry Park, you run a travel company which organises adventure holidays in some difficult places. How did you first become interested in 'adventure travel'?

Harry: Well, my father worked in an insurance company once he had a family. But before that he'd spent several years travelling the world, and he never stopped telling us about it. His stories were much more exciting than the books I read, and they made me want to travel and have adventures of my own.

Int: And what made you decide to start an adventure travel company?

Harry: Well, when I was in my twenties, I travelled a lot in different countries. I went exploring and climbing in mountains and deserts. I wanted to show other people how wonderful these things were. The business has been very successful, but when I started it I didn't know if I'd make any money.

Int: Your company's called Far and Wide. How did you choose the name?

Harry: Well. I just called It Park Travel at first. But everyone thought that was terribly boring! My wife kept suggesting different things, but in the end it was a customer who gave me the idea. Far and Wide is also the title of a book that a friend wrote, so it reminds me of him, too.

Int: Great... The places you visit are usually very unspoilt, Harry. Some people think it's not a good idea to take tourists there. What would you say to them?

Harry: Well, most of the places we visit have no inhabitants, so we aren't going to spoil people's way of life, or bring in things like television and fridges! And I make sure that we always take care of the environment. We are careful not to cause pollution, so we take all our rubbish away.

Int: Some of the things you do are also dangerous. Do you enjoy danger?

Harry: Well, it's not a question of enjoying it - it's just that you can't do what I do without thinking about the possible dangers. I'm never frightened though. If I'm taking a group up a mountain or something like that, I just concentrate on what I have to do and get on with it.

Int: You've been to some fascinating places, Harry. What's your favourite?

Harry: It's in India. You travel along a river through spectacular scenery and up into the mountains in Madhya Pradesh. In the valley on the other side there's a wonderful old castle. It's magical. The mountains hide it, so few people know it's there ...

Int: Thanks for talking to us, Harry...

Harry: Thank you.

Int: Tuyệt... Những nơi bạn đến thăm thường rất hoang sơ, Harry. Một số người nghĩ rằng không nên đưa khách du lịch đến đó. Bạn sẽ nói gì với họ?

Int: Cảm ơn vì đã nói chuyện với chúng tôi, Harry...

  fullScript: `Now we are ready to start. Listen carefully. You will hear the recording twice.

Int: Now Linda, let's talk about your first job.

Linda: Well, I was an assistant in an expensive cake shop in the small town where I lived. It was my last year at school, before I went to college. I wanted to earn extra money for myself because I come from a family of seven and my parents couldn't afford to give us much pocket money.

Int: Did you like your first boss?

Linda: He was always polite, never shouted at us, even when we dropped things; and that was good for a young girl like me who wasn't very confident. He knew everything about the business. I had no proper training, but it was good experience working with someone with so much knowledge. He didn't pay us well, but I didn't expect to earn much in my first job.

Int: And what about the shop? Was it a nice place to work?

Linda: As I say, it was an expensive shop, and the cakes were beautiful. Then in the morning there was this wonderful smell of bread baking. The first week was difficult because I just wanted to eat the cakes, which wasn't allowed, but then I lost interest in them. We had to keep everything clean, and that was hard work.

Int: Did you do any of the baking yourself?

Linda: There were two chefs who were specialists in making cakes for celebrations, and creating new bread recipes. I loved watching them at work, but I wasn't allowed to touch the ones on display in the windows. We sold sandwiches at lunchtime - again, very luxurious ones, and the shop assistants had to make those. I learnt: I put in really generous fillings, much more than I used at home.

Int: How did you get on with the other shop assistants?

Linda: One of them was my best friend, which was great, but the full-time staff sometimes treated us like silly schoolgirls because we couldn't cook. But I was surprised because the full-time assistants couldn't add up in their head. I was good at it, but they used calculators if there was anything difficult to work out.

Int: Did you enjoy serving customers in the shop?

Linda: The best part of the day was lunchtime, when we were busy. Time just flew. Then it was interesting when people came in to plan a party or a wedding. One of the chefs would come through to discuss the design of the cake. Some customers thought the prices were too high, but usually ended up buying the cakes anyway.

BẢN DỊCH TIẾNG VIỆT

Int: Bây giờ Linda, hãy nói về công việc đầu tiên của bạn.

Int: Bạn có thích ông chủ đầu tiên của bạn?

Linda: Anh ấy luôn lịch sự, không bao giờ hét vào mặt chúng tôi, ngay cả khi chúng tôi làm rơi đồ đạc; và điều đó rất tốt cho một cô gái trẻ như tôi, người không mấy tự tin. Anh ấy biết mọi thứ về công việc kinh doanh. Tôi không được đào tạo bài bản, nhưng đó là kinh nghiệm tốt khi làm việc với một người có nhiều kiến thức như vậy. Anh ấy trả lương cho chúng tôi không cao, nhưng tôi không mong kiếm được nhiều tiền trong công việc đầu tiên của mình.

Int: Còn cửa hàng thì sao? Đó có phải là một nơi tốt đẹp để làm việc?

Linda: Như tôi đã nói, đó là một cửa hàng đắt tiền và những chiếc bánh rất đẹp. Sau đó, vào buổi sáng, có mùi thơm tuyệt vời của bánh mì nướng. Tuần đầu tiên thật khó khăn vì tôi chỉ muốn ăn những chiếc bánh ngọt, điều mà không được phép, nhưng sau đó tôi mất hứng thú với chúng. Chúng tôi phải giữ mọi thứ sạch sẽ, và đó là công việc khó khăn.

Int: Bạn có tự làm món nướng nào không?

Linda: Có hai đầu bếp chuyên làm bánh cho các dịp lễ kỷ niệm, và sáng tạo ra những công thức bánh mì mới. Tôi thích xem họ làm việc, nhưng tôi không được phép chạm vào những chiếc bánh trưng bày trong tủ kính. Chúng tôi bán bánh mì sandwich vào giờ ăn trưa - một lần nữa, những chiếc bánh mì rất sang trọng, và những người bán hàng phải tự làm những món đó. Tôi đã học được: Tôi đã cho nhân rất hào phóng, nhiều hơn những gì tôi dùng ở nhà.

Int: Bạn hòa thuận với những người bán hàng khác như thế nào?

Linda: Một trong số họ là bạn thân của tôi, điều đó thật tuyệt, nhưng các nhân viên chính thức đôi khi đối xử với chúng tôi như những cô nữ sinh ngớ ngẩn vì chúng tôi không biết nấu ăn. Nhưng tôi đã rất ngạc nhiên vì các nhân viên chính thức không thể tính nhẩm trong đầu. Tôi giỏi khoản đó, nhưng họ phải dùng máy tính nếu có gì khó phải tính toán.

  fullScript: `Now we are ready to start. Listen carefully. You will hear the recording twice.

Woman: My guest today is Tim Jones, who organises an international summer course for young musicians. Tim, tell us all about it.

Tim: Well, I'm lucky to have such a great job. Basically, young musicians come from all over the world and learn to play together as an orchestra. By the end of the six-week course, they're really good and hearing them play is what gives me most pleasure. Unfortunately, I don't get to know them all that well, as organising every single detail of the course keeps me busy.

Woman: So, how do you find the young musicians?

Tim: We advertise on the Internet. Anyone between the ages of sixteen and twenty can complete the application form and email it to us, along with a short recording of their playing. We're not looking for perfect performances or the stars of tomorrow - just people good enough to play in an orchestra. The course is in English, but only a basic level of spoken language is necessary.

Woman: And the teachers?

Tim: The teachers are well-known musicians. Because they want to help young people they do this work for a very low salary, which is very kind of them. But it's my job to take care of them and make sure they're happy with their accommodation and so on. They generally have a great time, but some of them can be a bit difficult and sometimes complain about things.

Woman: So where is the course held?

Tim: In different places each year, actually, but it's usually a university during the summer holidays. They have large halls for practising, plus plenty of bedrooms and dining rooms. Most importantly, though, the place has to have good rail, road and air connections, so somewhere in the middle of the countryside's no good.

Woman: Do the students bring their own instruments?

Tim: Mostly, yes. So, another thing to consider is security. Storing instruments in a locked room when they're not being used is essential. Can you imagine a hundred or more musical instruments lying around - violins, trumpets, flutes, cellos - all worth a lot of money. It would be terrible if one got damaged, or even worse stolen!

Woman: And at the end of the course, there's a concert tour.

Tim: That's right. I book concert halls and work out the programmes months in advance. It's important to get it right. Ticket prices aren't high, because we're not a professional orchestra, but lots of people buy them. We don't make a profit, but take enough money to pay for the students' travel and living expenses. It's a fantastic experience for them.

BẢN DỊCH TIẾNG VIỆT

Bây giờ chúng ta đã sẵn sàng để bắt đầu. Lắng nghe một cách cẩn thận. Bạn sẽ nghe đoạn ghi âm hai lần.

Người phụ nữ: Khách của tôi hôm nay là Tim Jones, người tổ chức một khóa học mùa hè quốc tế cho các nhạc sĩ trẻ. Tim, hãy cho chúng tôi biết tất cả về nó.

Tim: Chà, tôi thật may mắn khi có một công việc tuyệt vời như vậy. Về cơ bản, các nhạc sĩ trẻ đến từ khắp nơi trên thế giới và học cách chơi cùng nhau như một dàn nhạc. Vào cuối khóa học kéo dài sáu tuần, chúng thực sự rất giỏi và việc nghe chúng chơi là điều khiến tôi hài lòng nhất. Thật không may, tôi không biết rõ về chúng, vì việc tổ chức từng chi tiết của khóa học luôn khiến tôi bận rộn.

Người phụ nữ: Vì vậy, làm thế nào để bạn tìm thấy các nhạc sĩ trẻ?

Tim: Chúng tôi quảng cáo trên Internet. Bất kỳ ai trong độ tuổi từ mười sáu đến hai mươi đều có thể hoàn thành mẫu đơn đăng ký và gửi qua email cho chúng tôi, cùng với một đoạn ghi âm ngắn quá trình chơi của họ. Chúng tôi không tìm kiếm những màn trình diễn hoàn hảo hay những ngôi sao của ngày mai – chỉ là những người đủ giỏi để chơi trong một dàn nhạc. Khóa học bằng tiếng Anh, nhưng chỉ cần trình độ cơ bản của ngôn ngữ nói là cần thiết.

Người phụ nữ: Và các giáo viên?

Tim: Các giáo viên đều là những nhạc sĩ nổi tiếng. Bởi vì họ muốn giúp đỡ những người trẻ tuổi nên họ làm công việc này với mức lương rất thấp, điều này rất từ tế với họ. Nhưng công việc của tôi là chăm sóc họ và đảm bảo rằng họ hài lòng với chỗ ở của mình, v.v. Họ thường có khoảng thời gian tuyệt vời, nhưng một số người trong số họ có thể hơi khó tính và đôi khi phàn nàn về mọi thứ.

Người phụ nữ: Vậy khóa học được tổ chức ở đâu?

Tim: Thực ra mỗi năm ở những nơi khác nhau, nhưng đó thường là trường đại học trong các kỳ nghỉ hè. Họ có những hội trường lớn để luyện tập, cùng với nhiều phòng ngủ và phòng ăn. Tuy nhiên, điều quan trọng nhất là nơi đó phải có kết nối đường sắt, đường bộ và đường hàng không tốt, vì vậy một nơi nào đó ở giữa vùng nông thôn sẽ không tốt.

Người phụ nữ: Học sinh có mang theo nhạc cụ của mình không?

Tim: Hầu hết là có. Vì vậy, một điều khác cần xem xét là bảo mật. Cất dụng cụ trong phòng khóa khi không sử dụng là điều cần thiết. Bạn có thể tưởng tượng có hàng trăm nhạc cụ trở lên nằm xung quanh - đàn vĩ cầm, kèn, sáo, đàn cello - tất cả đều đáng giá rất nhiều tiền. Sẽ thật tồi tệ nếu một cái bị hư hỏng, hoặc thậm chí tệ hơn là bị đánh cắp!

Người phụ nữ: Và vào cuối khóa học, có một chuyến lưu diễn.

Tim: Đúng vậy. Tôi đặt phòng hòa nhạc và lên kế hoạch cho các chương trình trước nhiều tháng. Điều quan trọng là phải làm cho đúng. Giá vé không cao, bởi vì chúng tôi không phải là một dàn nhạc chuyên nghiệp, nhưng rất nhiều người mua chúng. Chúng tôi không kiếm lợi nhuận, nhưng lấy đủ tiền để trả chi phí đi lại và sinh hoạt của sinh viên. Đó là một kinh nghiệm tuyệt vời cho họ.`,

  fullScript: `Man: Today I'm talking to Marta Stanton, who runs her own 'mobile' restaurant. Marta, how did you get into the restaurant business?

Marta: Well, I learnt to cook at college. I always wanted to open my own restaurant - but had no money. So I got a job as a chef. I had all sorts of ideas for new dishes, which the staff thought would sell, but the guy who owned the place wasn't interested. That's when a friend told me about the 'mobile restaurant' idea. It sounded great.

Man: Tell us about it.

Marta: Well, it works like this: you decide on a menu - obviously you have to be able to cook - then you advertise it so people can book a meal. The most amazing thing is all the advertising's done through social-networking websites. People set up tables in their sitting-room, or in a city car park, an empty factory - anywhere in fact. And because you know how many people you're cooking for, food doesn't get wasted.

Man: So why was it good for you?

Marta: Well, various reasons. Like, I could buy all the ingredients without risk because you make customers pay in advance. The greatest advantage, though, is by having a maximum of ten customers, I didn't need to hire a waiter. Then, of course, I could prepare everything at home - just take a camping gas cooker with me, plus some plates, glasses, knives and forks.

Man: Do you never run into problems?

Marta: The whole experience is fun. People watch you cook and the atmosphere's relaxed. I did one meal on a beach which almost went wrong because I didn't think about the wind blowing sand into people's food. Fortunately, I'd brought a large umbrella to protect myself from the sun, so I put it around their table instead!

Man: And you sometimes use your own flat?

Marta: If the weather's bad, people come to my home instead, but it gets very crowded. Even though I've actually got enough chairs and a big table, it's not ideal. I was worried we might disturb the neighbours, but they've been alright about it. I love the temporary feel of the mobile idea, so home's not really what it's about.

Man: So, what's the future of mobile restaurants?

Marta: Well, it's rather uncertain. Lots of new ones are popping up because it's become fashionable. I think health inspectors will want to check them out. That doesn't worry me, because I'm a trained chef. But if someone got ill in a less serious one, we might all get a bad name. So I guess inspections are a good thing.

----------------------------------------
BẢN DỊCH TIẾNG VIỆT

Nam : Hôm nay tôi đang nói chuyện với Marta Stanton, người điều hành nhà hàng 'di động' của riêng mình. Marta, bạn đã tham gia kinh doanh nhà hàng như thế nào?

Marta : Chà, tôi đã học nấu ăn ở trường đại học. Tôi luôn muốn mở nhà hàng của riêng mình – nhưng không có tiền. Vì vậy, tôi đã nhận được một công việc như một đầu bếp. Tôi có đủ loại ý tưởng cho những món ăn mới mà nhân viên nghĩ là sẽ bán được, nhưng anh chàng chủ quán không hứng thú. Đó là khi một người bạn nói với tôi về ý tưởng 'nhà hàng di động'. Nó nghe thật tuyệt.

Người đàn ông : Hãy cho chúng tôi biết về nó.

Marta : Chà, nó hoạt động như thế này: bạn quyết định thực đơn – rõ ràng là bạn phải có khả năng nấu ăn – sau đó bạn quảng cáo nó để mọi người có thể đặt bữa ăn. Điều tuyệt vời nhất là tất cả các quảng cáo được thực hiện thông qua các trang web mạng xã hội. Mọi người dọn bàn trong phòng khách của họ, hoặc trong bãi đậu xe của thành phố, một nhà máy bỏ trống - thực tế là ở bất cứ đâu. Và bởi vì bạn biết mình đang nấu ăn cho bao nhiêu người nên thức ăn sẽ không bị lãng phí.

Người đàn ông : Vậy tại sao nó tốt cho bạn?

Marta : Chà, nhiều lý do khác nhau. Giống như, tôi có thể mua tất cả các thành phần mà không gặp rủi ro vì bạn bắt khách hàng trả tiền trước. Tuy nhiên, lợi thế lớn nhất là có tối đa mười khách hàng nên tôi không cần thuê người phục vụ. Sau đó, tất nhiên, tôi có thể chuẩn bị mọi thứ ở nhà – chỉ cần mang theo một chiếc bếp ga cắm trại, cùng với một số đĩa, ly, dao và nĩa.

Người đàn ông : Bạn không bao giờ gặp rắc rối à?

Marta : Toàn bộ trải nghiệm thật thú vị. Mọi người xem bạn nấu ăn và bầu không khí thoải mái. Tôi đã làm một bữa ăn trên bãi biển và suýt nữa thì hỏng việc vì tôi không nghĩ đến việc gió thổi cát bay vào thức ăn của mọi người. May mắn thay, tôi đã mang theo một chiếc ô lớn để tránh nắng, vì vậy tôi đã đặt nó xung quanh bàn của họ!

Người đàn ông : Và đôi khi bạn sử dụng căn hộ của riêng bạn?

Marta : Nếu thời tiết xấu, mọi người sẽ đến nhà tôi, nhưng nó rất đông. Mặc dù tôi thực sự có đủ ghế và một cái bàn lớn, nhưng nó không phải là lý tưởng. Tôi đã lo lắng rằng chúng tôi có thể làm phiền những người hàng xóm, nhưng họ đã ổn về điều đó. Tôi thích cảm giác tạm thời của ý tưởng di động, vì vậy nhà không thực sự là những gì nó hướng tới.

Người đàn ông : Vậy, tương lai của nhà hàng di động là gì?

Marta : Chà, nó hơi không chắc chắn. Rất nhiều cái mới đang xuất hiện vì nó đã trở thành mốt. Tôi nghĩ các thanh tra y tế sẽ muốn kiểm tra chúng. Điều đó không làm tôi lo lắng, bởi vì tôi là một đầu bếp được đào tạo. Nhưng nếu ai đó bị ốm ở mức độ ít nghiêm trọng hơn, tất cả chúng ta có thể bị mang tiếng xấu. Vì vậy, tôi đoán kiểm tra là một điều tốt.`,

  fullScript: `Interviewer: On Jobwise this week, Toby Merchant is going to talk about his job. Welcome Toby.

Toby: Thank you.

Interviewer: Now you work for a large engineering company called Atkins Engineering. How long have you been there?

Toby: I've worked there for three years. While I was at university I worked for a small company during the holidays. And when I left university they offered me a job. I stayed there for six months and then I succeeded in getting a much better job at Atkins Engineering.

Interviewer: What kind of work do you actually do?

Toby: Most people in my company work on motorways and road-building. But since I started here I've spent all my time working on the new airport. We haven't finished the designs yet, so building won't start for a while. In the future, I'd really like to work on something smaller like houses and flats.

Interviewer: And do you enjoy your job? Is it what you expected?

Toby: I do enjoy it and no, it's not really what I expected. I thought I'd spend most of my time in the office designing buildings and roads and bridges. I was surprised to find that I actually spend a lot of my time discussing things with other people. I work very closely with architects, for example. And I'm mostly outside, away from the office.

Interviewer: Sounds interesting. It's not a very popular occupation though, is it? Why is that do you think?

Toby: Most people know that engineers earn a good salary, so it's not that. No, it's because young people think it's not going to be interesting. But I find it a very exciting job. And there are lots of opportunities for both men and women.

Interviewer: Are there any disadvantages to the job?

Toby: Well, some people don't like the long hours. That doesn't worry me because I love my work. What I find difficult is that I can't plan my free time. Sometimes there's an emergency or I have to travel to talk to someone. But I always look forward to going on holiday - we have six weeks off a year so I can't really complain!

Interviewer: Did you always want to be an engineer?

Toby: I was always good at maths and science at school. My father's an architect and he was keen for me to do that but I wanted to do something different so I was thinking of becoming a doctor. But I got a job on a building site after I left school and decided to be an engineer.

Interviewer: Thank you, Toby, for coming to talk ....

----------------------------------------
BẢN DỊCH TIẾNG VIỆT

Người phỏng vấn: Trên Jobwise tuần này, Toby Merchant sẽ nói về công việc của anh ấy. Chào Toby.

Toby: Cảm ơn bạn.

Người phỏng vấn: Bây giờ bạn làm việc cho một công ty kỹ thuật lớn tên là Atkins Engineering. Bạn đã ở đó được bao lâu?

Toby: Tôi đã làm việc ở đó được ba năm. Khi còn học đại học, tôi đã làm việc cho một công ty nhỏ trong những ngày nghỉ. Và khi tôi rời trường đại học, họ đề nghị cho tôi một công việc. Tôi ở đó trong sáu tháng và sau đó tôi đã kiếm được một công việc tốt hơn nhiều tại Atkins Engineering.

Người phỏng vấn: Bạn thực sự làm công việc gì?

Toby: Hầu hết mọi người trong công ty của tôi làm việc trên đường cao tốc và xây dựng cầu đường. Nhưng kể từ khi tôi bắt đầu ở đây, tôi đã dành toàn bộ thời gian để làm việc ở sân bay mới. Chúng tôi vẫn chưa hoàn thành thiết kế, vì vậy việc xây dựng sẽ chưa bắt đầu trong một thời gian. Trong tương lai, tôi thực sự muốn làm việc trên những thứ nhỏ hơn như nhà và căn hộ.

Người phỏng vấn: Và bạn có thích công việc của mình không? Nó có phải là những gì bạn mong đợi không?

Toby: Tôi thích nó và không, nó không thực sự như tôi mong đợi. Tôi đã nghĩ mình sẽ dành phần lớn thời gian trong văn phòng để thiết kế các tòa nhà, cầu đường. Tôi ngạc nhiên khi thấy rằng tôi thực sự dành nhiều thời gian để thảo luận mọi thứ với người khác. Ví dụ, tôi làm việc rất chặt chẽ với các kiến trúc sư. Và tôi chủ yếu ở bên ngoài, cách xa văn phòng.

Người phỏng vấn: Nghe có vẻ thú vị. Nhưng đó không phải là một nghề nghiệp rất phổ biến, phải không? Tại sao bạn nghĩ vậy?

Toby: Hầu hết mọi người đều biết rằng các kỹ sư kiếm được một mức lương tốt, vì vậy không phải vậy. Không, đó là bởi vì những người trẻ tuổi nghĩ rằng nó sẽ không thú vị. Nhưng tôi thấy đó là một công việc rất thú vị. Và có rất nhiều cơ hội cho cả nam và nữ.

Người phỏng vấn: Công việc có bất lợi gì không?

Toby: Chà, một số người không thích thời gian dài. Điều đó không làm tôi lo lắng vì tôi yêu công việc của mình. Điều tôi cảm thấy khó khăn là tôi không thể lên kế hoạch cho thời gian rảnh của mình. Đôi khi có trường hợp khẩn cấp hoặc tôi phải đi xa để nói chuyện với ai đó. Nhưng tôi luôn mong được đi nghỉ - chúng tôi có sáu tuần nghỉ mỗi năm nên tôi thực sự không thể phàn nàn được!

Người phỏng vấn: Có phải bạn luôn muốn trở thành một kỹ sư?

Toby: Tôi luôn giỏi toán và khoa học ở trường. Cha tôi là một kiến trúc sư và ông rất muốn tôi làm điều đó nhưng tôi muốn làm điều gì đó khác biệt nên tôi đã nghĩ đến việc trở thành bác sĩ. Nhưng tôi đã kiếm được một công việc tại một công trường xây dựng sau khi rời trường học và quyết định trở thành một kỹ sư.

        t.textContent = msg;
        c.appendChild(t);
        setTimeout(() => {

      // ───────── MODAL ─────────

      function showModal(icon, title, desc, confirmText, onConfirm) {
        $('#modalIcon').textContent = icon;
        $('#modalTitle').textContent = title;
        $('#modalDesc').textContent = desc;
        $('#modalConfirm').textContent = confirmText;
        modalCallback = onConfirm;
        $('#modalOverlay').classList.add('show');

        $('#modalOverlay').classList.remove('show');
        modalCallback = null;
      }
      $('#modalCancel').onclick = closeModal;
      $('#modalConfirm').onclick = () => {

        closeModal();

      $('#modalOverlay').onclick = (e) => { if (e.target === $('#modalOverlay')) closeModal(); };

      // ───────── ZOOM ─────────
      function applyZoom() {
        $$('#imageScroll img').forEach(img => { img.style.transform = `scale(${zoomLevel})`; });
        $('#zoomLabel').textContent = Math.round(zoomLevel * 100) + '%';
      }
      function initZoom() {
        $('#zoomInBtn').onclick = () => { if (zoomLevel < 3) { zoomLevel += 0.2; applyZoom(); } };
        $('#zoomOutBtn').onclick = () => { if (zoomLevel > 0.3) { zoomLevel -= 0.2; applyZoom(); } };
        $('#zoomResetBtn').onclick = () => { zoomLevel = 1; applyZoom(); };
        $('#imageScroll').addEventListener('wheel', (e) => {
          if (e.ctrlKey) {
            e.preventDefault();
            zoomLevel += e.deltaY < 0 ? 0.2 : -0.2;
            zoomLevel = Math.min(3, Math.max(0.3, zoomLevel));
            applyZoom();
          }
        }, { passive: false });
      }

      // ───────── RENDER IMAGE ─────────
      function renderImagePanel() {
        const test = getCurrentTest();
        const scroll = $('#imageScroll');

        if (test.pages && test.pages.length > 0) {
          test.pages.forEach(src => {
            const img = document.createElement('img');
            img.src = src;
            img.alt = 'Đề bài';
            img.onerror = () => { img.style.display = 'none'; };
            scroll.appendChild(img);
          });
        } else {
          scroll.innerHTML = '<div class="no-image">📷 Không có ảnh trang đề</div>';
        }
        zoomLevel = 1;

      // ───────── FILTER ─────────
      function getFilteredQuestions() {
        const test = getCurrentTest();
        return test.questions.map((q, i) => ({ q, i })).filter(({ q, i }) => {
          if (currentFilter === 'unanswered') return userAnswers[i] === null || userAnswers[i] === undefined;
          if (currentFilter === 'bookmarked') return bookmarks[i];
          return true;
        });
      }

      function updateFilterButtons() {
        const test = getCurrentTest();
        const total = test.questions.length;
        const unanswered = test.questions.filter((_, i) => userAnswers[i] === null || userAnswers[i] === undefined).length;
        const bm = test.questions.filter((_, i) => bookmarks[i]).length;
        $('#filterAll').textContent = 'Tất cả';
        $('#filterUnanswered').textContent = `⭕ Chưa trả lời (${unanswered})`;
        $('#filterBookmarked').textContent = `⭐ Đánh dấu (${bm})`;
        ['filterAll', 'filterUnanswered', 'filterBookmarked'].forEach(id => {
          $('#' + id).classList.remove('active');
        });
        const activeId = currentFilter === 'all' ? 'filterAll' : currentFilter === 'unanswered' ? 'filterUnanswered' : 'filterBookmarked';
        $('#' + activeId).classList.add('active');
        const shown = getFilteredQuestions().length;
        $('#filterCount').textContent = currentFilter !== 'all' ? `Hiển thị ${shown}/${total}` : '';
      }

      // ───────── RENDER QUESTIONS ─────────
      function renderQuestionList() {
        const test = getCurrentTest();
        const list = $('#questionList');
        list.innerHTML = '';
        const filtered = getFilteredQuestions();

        if (filtered.length === 0) {
          list.innerHTML = '<div style="padding:30px;text-align:center;color:var(--text-muted);font-size:0.85rem;">Không có câu hỏi nào phù hợp bộ lọc</div>';
          updateFilterButtons();
          return;
        }

        filtered.forEach(({ q, idx: _idx }, _) => {
          const idx = _idx !== undefined ? _idx : filtered.findIndex(f => f.q === q && f.i !== undefined) !== -1 ? filtered.find(f => f.q === q).i : 0;
        });

        // Re-iterate properly
        list.innerHTML = '';
        getFilteredQuestions().forEach(({ q, i: idx }) => {
          const card = document.createElement('div');
          card.className = 'q-card';
          card.dataset.qIndex = idx;
          if (userAnswers[idx] !== null && userAnswers[idx] !== undefined) card.classList.add('answered');
          if (bookmarks[idx]) card.classList.add('bookmarked-card');

          const opts = (currentPart === 1 ? ['A', 'B', 'C'] : q.options);
          let optsHtml = '';
          opts.forEach((optText, optIdx) => {
            const sel = userAnswers[idx] === optIdx;
            let cls = 'opt';
            if (sel) cls += ' selected';
            if (revealed) {
              if (optIdx === q.correct) cls += ' correct';
              else if (sel && optIdx !== q.correct) cls += ' wrong';
            }
            const letter = String.fromCharCode(65 + optIdx);
            optsHtml += `<div class="${cls}" data-opt="${optIdx}"><span>${letter}</span>${currentPart === 1 ? '' : ' <span style="font-size:0.72rem;font-weight:500;white-space:normal;word-break:break-word;">' + optText + '</span>'}</div>`;
          });

          const qNum = currentPart === 1 ? idx + 1 : idx + 8;
          card.innerHTML = `
            <div class="q-header">
              <span class="q-num">Câu ${qNum}</span>
              <span class="q-text">${q.text || '(Xem hình)'}</span>
              <button class="q-bookmark ${bookmarks[idx] ? 'bookmarked' : ''}" data-bm="${idx}" title="Đánh dấu câu hỏi">⭐</button>
            </div>
            <div class="options-row">${optsHtml}</div>
          `;
          list.appendChild(card);

        $$('.opt').forEach(btn => {
          btn.addEventListener('click', function(e) {
            e.stopPropagation();
            if (revealed) return;
            const card = this.closest('.q-card');
            const qIdx = parseInt(card.dataset.qIndex);
            const optIdx = parseInt(this.dataset.opt);
            userAnswers[qIdx] = optIdx;
            renderQuestionList();
            updateScore();
            updateProgress();
            saveState();
          });
        });

        $$('.q-bookmark').forEach(bm => {
          bm.addEventListener('click', function(e) {

            const idx = parseInt(this.dataset.bm);
            bookmarks[idx] = !bookmarks[idx];
            if (bookmarks[idx]) showToast('⭐ Đã đánh dấu câu ' + (currentPart === 1 ? idx + 1 : idx + 8), 'default', 1500);
            renderQuestionList();
            saveState();
          });
        });

        updateProgress();
        updateFilterButtons();

      function updateProgress() {
        const test = getCurrentTest();
        const total = test.questions.length;
        let answered = 0;
        test.questions.forEach((_, i) => {
          if (userAnswers[i] !== null && userAnswers[i] !== undefined) answered++;
        });
        $('#answeredCount').textContent = answered + '/' + total;
        $('#progressFill').style.width = (answered / total * 100) + '%';
      }

      function updateScore() {
        const test = getCurrentTest();
        let correct = 0, answered = 0;
        test.questions.forEach((q, i) => {
          if (userAnswers[i] !== null && userAnswers[i] !== undefined) {
            answered++;
            if (userAnswers[i] === q.correct) correct++;
          }
        });
        $('#scoreDisplay').textContent = `✅ ${correct}/${answered}`;
      }

      // ───────── TIMER ─────────
      function startTimer() {
        stopTimer();

        updateTimerDisplay();
        timerInterval = setInterval(() => {
          timerSeconds--;
          updateTimerDisplay();
          if (timerSeconds <= 0) { stopTimer(); submitQuiz(); }
        }, 1000);
      }
      function stopTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = null;
      }
      function updateTimerDisplay() {
        const m = Math.floor(timerSeconds / 60);
        const s = timerSeconds % 60;
        const display = $('#timerDisplay');
        display.textContent = '⏱ ' + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
        display.classList.toggle('warning', timerSeconds <= 300);
      }

      // ───────── AUDIO ─────────
      function stopAudio() {
        if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; currentAudio = null; }
        $('#playPauseBtn').textContent = '▶️';
        $('#seekSlider').value = 0;
        $('#timeDisplay').textContent = '00:00 / 00:00';
        loopStart = null; loopEnd = null; loopActive = false;
        $('#loopBtn').style.background = '';
      }
      function formatTime(sec) {
        const m = Math.floor(sec / 60), s = Math.floor(sec % 60);
        return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
      }
      function playTestAudio() {
        const test = getCurrentTest();
        if (!test.audioUrl) { showToast('⚠️ Không có file audio cho test này.', 'danger'); return; }
        stopAudio();
        const audio = new Audio(test.audioUrl);
        audio.playbackRate = parseFloat($('#speedSelect').value) || 1;
        audio.volume = parseFloat($('#volumeSlider').value) || 0.8;
        currentAudio = audio;
        audio.addEventListener('loadedmetadata', () => {
          $('#seekSlider').max = audio.duration;
          $('#timeDisplay').textContent = '00:00 / ' + formatTime(audio.duration);
        });
        audio.addEventListener('timeupdate', () => {
          $('#seekSlider').value = audio.currentTime;
          $('#timeDisplay').textContent = formatTime(audio.currentTime) + ' / ' + formatTime(audio.duration || 0);
          if (loopActive && loopEnd !== null && audio.currentTime >= loopEnd) {
            audio.currentTime = loopStart || 0;
          }
        });
        audio.addEventListener('ended', () => { $('#playPauseBtn').textContent = '▶️'; currentAudio = null; });
        audio.addEventListener('play', () => { $('#playPauseBtn').textContent = '⏸️'; });
        audio.addEventListener('pause', () => { $('#playPauseBtn').textContent = '▶️'; });
        audio.play().catch(e => {
          showToast('⚠️ Không thể phát audio: ' + e.message, 'danger');
          currentAudio = null;
          $('#playPauseBtn').textContent = '▶️';
        });
      }
      function togglePlayPause() {
        if (!currentAudio) { playTestAudio(); return; }
        if (currentAudio.paused) currentAudio.play();
        else currentAudio.pause();
      }
