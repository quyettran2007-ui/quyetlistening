<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>LUYỆN THI LISTENING | TRẦN XUÂN QUYẾT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d1117;
      --bg2: #161b22;
      --surface: #1c2128;
      --surface-alt: #21262d;
      --surface-hover: #2d333b;
      --text: #e6edf3;
      --text-muted: #7d8590;
      --border: #30363d;
      --border-subtle: #21262d;
      --primary: #58a6ff;
      --primary-glow: rgba(88,166,255,0.15);
      --primary-hover: #79b8ff;
      --primary-light: rgba(88,166,255,0.1);
      --success: #3fb950;
      --success-light: rgba(63,185,80,0.15);
      --danger: #f85149;
      --danger-light: rgba(248,81,73,0.15);
      --warning: #d29922;
      --warning-light: rgba(210,153,34,0.15);
      --accent: #bc8cff;
      --accent2: #ff7b72;
      --radius: 12px;
      --radius-sm: 8px;
      --radius-xs: 5px;
      --shadow: 0 8px 24px rgba(0,0,0,0.4);
      --shadow-lg: 0 16px 48px rgba(0,0,0,0.6);
      --transition: 0.18s cubic-bezier(0.4, 0, 0.2, 1);
      --font-mono: 'JetBrains Mono', monospace;
      --highlight: rgba(255,214,0,0.25);
      --highlight-strong: rgba(255,214,0,0.4);
      --glow-blue: 0 0 20px rgba(88,166,255,0.3);
      --glow-green: 0 0 20px rgba(63,185,80,0.3);
    }
    .light {
      --bg: #f6f8fa;
      --bg2: #ffffff;
      --surface: #ffffff;
      --surface-alt: #f6f8fa;
      --surface-hover: #edf2f7;
      --text: #24292f;
      --text-muted: #57606a;
      --border: #d0d7de;
      --border-subtle: #e8ecef;
      --primary: #0969da;
      --primary-glow: rgba(9,105,218,0.1);
      --primary-hover: #0550ae;
      --primary-light: rgba(9,105,218,0.08);
      --success: #1a7f37;
      --success-light: rgba(26,127,55,0.1);
      --danger: #d1242f;
      --danger-light: rgba(209,36,47,0.1);
      --accent: #8250df;
      --shadow: 0 4px 16px rgba(0,0,0,0.08);
      --shadow-lg: 0 12px 32px rgba(0,0,0,0.12);
      --highlight: rgba(255,213,0,0.4);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Sora', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: background var(--transition), color var(--transition);
      background-image: radial-gradient(ellipse at top left, rgba(88,166,255,0.04) 0%, transparent 50%),
                        radial-gradient(ellipse at bottom right, rgba(188,140,255,0.04) 0%, transparent 50%);
    }

    /* ── TOP BAR ── */
    .topbar {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      height: 52px;
      z-index: 20;
      flex-wrap: nowrap;
      position: relative;
    }
    .topbar::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--primary), var(--accent), transparent);
      opacity: 0.4;
    }
    .logo {
      font-weight: 800;
      font-size: 1.05rem;
      letter-spacing: -0.3px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .topbar-sep { flex: 1; }
    .topbar .badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-weight: 700;
      font-size: 0.72rem;
      background: var(--primary-light);
      color: var(--primary);
      border: 1px solid rgba(88,166,255,0.25);
      white-space: nowrap;
      letter-spacing: 0.5px;
    }
    .topbar select {
      padding: 5px 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-weight: 600;
      font-size: 0.8rem;
      cursor: pointer;
      outline: none;
      transition: all var(--transition);
      font-family: 'Sora', sans-serif;
    }
    .topbar select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-glow);
    }
    .btn-icon-sm {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      transition: all var(--transition);
      color: var(--text);
      flex-shrink: 0;
    }
    .btn-icon-sm:hover {
      background: var(--primary-light);
      border-color: var(--primary);
      transform: translateY(-1px);
    }
    .timer-display {
      font-family: var(--font-mono);
      font-weight: 600;
      font-size: 0.85rem;
      color: var(--text);
      background: var(--surface);
      padding: 5px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      white-space: nowrap;
      transition: all var(--transition);
    }
    .timer-display.warning {
      color: var(--danger);
      border-color: var(--danger);
      box-shadow: 0 0 12px rgba(248,81,73,0.2);
      animation: timerPulse 1s infinite;
    }
    @keyframes timerPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    /* ── MAIN LAYOUT ── */
    .main-container {
      display: flex;
      flex: 1;
      gap: 6px;
      padding: 6px;
      overflow: hidden;
    }

    /* ── IMAGE PANEL ── */
    .image-panel {
      flex: 0 0 48%;
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: all var(--transition);
    }
    .image-panel .zoom-bar {
      display: flex;
      gap: 5px;
      padding: 7px 10px;
      background: var(--surface-alt);
      border-bottom: 1px solid var(--border);
      align-items: center;
    }
    .zoom-bar button {
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text);
      transition: all var(--transition);
      font-family: 'Sora', sans-serif;
    }
    .zoom-bar button:hover {
      background: var(--primary-light);
      border-color: var(--primary);
      color: var(--primary);
    }
    .zoom-bar .zoom-label {
      font-size: 0.7rem;
      color: var(--text-muted);
      font-family: var(--font-mono);
      margin-left: 4px;
    }
    .image-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
    }
    .image-scroll img {
      max-width: 100%;
      border-radius: var(--radius-sm);
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      background: #fff;
      transition: transform 0.15s ease;
      transform-origin: top center;
    }
    .no-image {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 1rem;
      font-weight: 500;
    }

    /* ── QUIZ PANEL ── */
    .quiz-panel {
      flex: 1 1 52%;
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .quiz-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      background: var(--surface-alt);
      border-bottom: 1px solid var(--border);
    }
    .quiz-header-title {
      font-weight: 700;
      font-size: 0.82rem;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .quiz-header-title::before {
      content: '';
      width: 3px;
      height: 16px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 2px;
    }
    .progress-mini {
      flex: 1;
      height: 5px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
      min-width: 80px;
    }
    .progress-mini-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      border-radius: 3px;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }
    .progress-mini-fill::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
      animation: shimmer 2s infinite;
    }
    @keyframes shimmer {
      to { left: 200%; }
    }
    .answered-count {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--text-muted);
      font-family: var(--font-mono);
      white-space: nowrap;
    }

    /* ── QUESTION LIST ── */
    .question-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .q-card {
      background: var(--surface-alt);
      border-radius: var(--radius-sm);
      padding: 11px 13px 11px 14px;
      border: 1.5px solid var(--border-subtle);
      border-left: 3px solid var(--border-subtle);
      cursor: pointer;
      transition: all var(--transition);
      position: relative;
      overflow: visible;
    }
    .q-card:hover {
      border-color: var(--primary);
      border-left-color: var(--primary);
      background: var(--surface-hover);
      box-shadow: 0 0 0 3px var(--primary-glow);
    }
    .q-card.active {
      border-color: var(--primary);
      border-left-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-glow);
      background: var(--primary-light);
    }
    .q-card.answered {
      border-left-color: var(--success);
    }
    .q-card.bookmarked-card {
      border-color: rgba(210,153,34,0.4);
      border-left-color: var(--warning);
    }

    .q-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 7px;
    }
    .q-num {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #fff;
      border-radius: 6px;
      padding: 2px 9px;
      font-size: 0.68rem;
      font-weight: 800;
      white-space: nowrap;
      letter-spacing: 0.3px;
      flex-shrink: 0;
    }
    .q-text {
      font-weight: 600;
      font-size: 0.84rem;
      color: var(--text);
      line-height: 1.4;
      flex: 1;
    }
    .q-bookmark {
      margin-left: auto;
      cursor: pointer;
      font-size: 1rem;
      opacity: 0.3;
      transition: all var(--transition);
      background: none;
      border: none;
      color: var(--text);
      padding: 2px;
      flex-shrink: 0;
      border-radius: 4px;
    }
    .q-bookmark:hover { opacity: 0.9; transform: scale(1.1); }
    .q-bookmark.bookmarked {
      opacity: 1;
      color: var(--warning);
      filter: drop-shadow(0 0 4px rgba(210,153,34,0.4));
    }

    /* ── OPTIONS ── */
    .options-row {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
    }
    .opt {
      flex: 1 1 60px;
      min-width: 55px;
      padding: 8px 6px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 0.78rem;
      border: 1.5px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      text-align: center;
      transition: all var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      color: var(--text);
      position: relative;
      overflow: visible;
      height: auto;
      min-height: 36px;
      word-break: break-word;
    }
    .opt::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity var(--transition);
    }
    .opt:hover {
      border-color: var(--primary);
      background: var(--primary-light);
      color: var(--primary);
      transform: translateY(-1px);
      box-shadow: var(--glow-blue);
    }
    .opt.selected {
      border-color: var(--primary);
      background: var(--primary-light);
      color: var(--primary);
      box-shadow: 0 0 0 2px var(--primary-glow);
    }
    .opt.correct {
      border-color: var(--success) !important;
      background: var(--success-light) !important;
      color: var(--success) !important;
      box-shadow: var(--glow-green) !important;
    }
    .opt.wrong {
      border-color: var(--danger) !important;
      background: var(--danger-light) !important;
      color: var(--danger) !important;
    }

    /* ── AUDIO BAR ── */
    .audio-bar {
      background: var(--bg2);
      border-top: 1px solid var(--border);
      padding: 7px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .btn-play {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #fff;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
      flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(88,166,255,0.3);
    }
    .btn-play:hover {
      transform: scale(1.08);
      box-shadow: 0 6px 20px rgba(88,166,255,0.5);
    }
    .btn-sm {
      width: 30px;
      height: 30px;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
      flex-shrink: 0;
      color: var(--text);
    }
    .btn-sm:hover {
      background: var(--primary-light);
      border-color: var(--primary);
      color: var(--primary);
    }

    /* ── SEEK BAR ── */
    .seek-bar {
      flex: 1 1 80px;
      min-width: 60px;
      accent-color: var(--primary);
      cursor: pointer;
      height: 4px;
      border-radius: 2px;
    }
    input[type=range] {
      -webkit-appearance: none;
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--primary);
      cursor: pointer;
      box-shadow: 0 0 6px rgba(88,166,255,0.5);
    }
    .time-text {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--text-muted);
      white-space: nowrap;
    }
    .speed-select {
      padding: 4px 7px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-weight: 600;
      font-size: 0.72rem;
      cursor: pointer;
      color: var(--text);
      outline: none;
      font-family: 'Sora', sans-serif;
    }
    .volume-slider {
      width: 60px;
      accent-color: var(--primary);
      cursor: pointer;
    }

    /* ── ACTION ROW ── */
    .action-row {
      padding: 7px 12px;
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
      border-top: 1px solid var(--border);
      background: var(--surface-alt);
    }
    .btn {
      padding: 7px 15px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      font-weight: 600;
      font-size: 0.78rem;
      transition: all var(--transition);
      color: var(--text);
      white-space: nowrap;
      font-family: 'Sora', sans-serif;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .btn:hover {
      background: var(--surface-hover);
      border-color: var(--primary);
      color: var(--primary);
      transform: translateY(-1px);
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--primary), #1f6feb);
      color: #fff;
      border: none;
      box-shadow: 0 4px 12px rgba(88,166,255,0.25);
    }
    .btn-primary:hover {
      background: linear-gradient(135deg, var(--primary-hover), #388bfd);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(88,166,255,0.4);
      color: #fff;
    }
    .btn-success {
      background: linear-gradient(135deg, var(--success), #0d6028);
      color: #fff;
      border: none;
      box-shadow: 0 4px 12px rgba(63,185,80,0.25);
    }
    .btn-success:hover {
      transform: translateY(-1px);
      color: #fff;
    }
    .btn-danger {
      background: linear-gradient(135deg, var(--danger), #b91c1c);
      color: #fff;
      border: none;
    }
    .btn-danger:hover {
      transform: translateY(-1px);
      color: #fff;
    }
    .score-badge {
      font-weight: 800;
      font-size: 0.82rem;
      padding: 6px 14px;
      border-radius: 8px;
      background: var(--primary-light);
      color: var(--primary);
      border: 1px solid rgba(88,166,255,0.25);
      white-space: nowrap;
      font-family: var(--font-mono);
    }

    /* ── SCRIPT PANEL ── */
    .script-panel {
      border-top: 1px solid var(--border);
      background: var(--bg);
      max-height: 160px;
      overflow-y: auto;
      padding: 10px 14px;
      font-size: 0.78rem;
      line-height: 1.7;
      display: none;
      white-space: pre-wrap;
    }
    .script-panel mark {
      background: var(--highlight);
      border-radius: 3px;
      padding: 1px 3px;
      font-weight: 600;
      color: var(--text);
    }
    .script-panel.show { display: block; }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(4px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }
    .modal-overlay.show {
      opacity: 1;
      pointer-events: all;
    }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      max-width: 420px;
      width: 90%;
      box-shadow: var(--shadow-lg);
      transform: translateY(20px) scale(0.96);
      transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .modal-overlay.show .modal {
      transform: translateY(0) scale(1);
    }
    .modal-icon {
      font-size: 2.5rem;
      text-align: center;
      margin-bottom: 16px;
      display: block;
    }
    .modal-title {
      font-size: 1.1rem;
      font-weight: 800;
      text-align: center;
      margin-bottom: 10px;
      color: var(--text);
    }
    .modal-desc {
      font-size: 0.85rem;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 24px;
      line-height: 1.6;
    }
    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
    }
    .modal-actions .btn {
      padding: 9px 22px;
      font-size: 0.85rem;
    }

    /* ── HISTORY PANEL ── */
    .history-panel {
      position: fixed;
      right: -360px;
      top: 52px;
      bottom: 0;
      width: 340px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      box-shadow: -8px 0 32px rgba(0,0,0,0.4);
      z-index: 100;
      display: flex;
      flex-direction: column;
      transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .history-panel.open { right: 0; }
    .history-header {
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface-alt);
    }
    .history-title {
      font-weight: 800;
      font-size: 0.9rem;
      flex: 1;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .history-close {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      transition: all var(--transition);
    }
    .history-close:hover { background: var(--danger-light); color: var(--danger); border-color: var(--danger); }
    .history-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }
    .history-empty {
      padding: 40px 20px;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.85rem;
    }
    .history-item {
      background: var(--surface-alt);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all var(--transition);
      position: relative;
    }
    .history-item:hover { border-color: var(--primary); background: var(--primary-light); }
    .history-item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .history-item-test {
      font-weight: 700;
      font-size: 0.82rem;
      color: var(--primary);
    }
    .history-item-score {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 5px;
      background: var(--success-light);
      color: var(--success);
    }
    .history-item-score.poor { background: var(--danger-light); color: var(--danger); }
    .history-item-score.medium { background: var(--warning-light); color: var(--warning); }
    .history-item-meta {
      font-size: 0.72rem;
      color: var(--text-muted);
      display: flex;
      gap: 8px;
    }
    .history-del {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 22px;
      height: 22px;
      border-radius: 5px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.7rem;
      display: none;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
    }
    .history-item:hover .history-del { display: flex; }
    .history-del:hover { background: var(--danger-light); color: var(--danger); }
    .history-footer {
      padding: 10px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }

    /* ── BOOKMARK FILTER ── */
    .filter-bar {
      display: flex;
      gap: 5px;
      padding: 6px 10px;
      background: var(--surface-alt);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-btn {
      padding: 3px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text-muted);
      transition: all var(--transition);
      font-family: 'Sora', sans-serif;
    }
    .filter-btn:hover { border-color: var(--primary); color: var(--primary); }
    .filter-btn.active {
      background: var(--primary-light);
      border-color: var(--primary);
      color: var(--primary);
    }
    .filter-btn.active.warning-btn {
      background: var(--warning-light);
      border-color: var(--warning);
      color: var(--warning);
    }
    .filter-count {
      font-size: 0.65rem;
      font-family: var(--font-mono);
      color: var(--text-muted);
      margin-left: auto;
    }

    /* ── TOOLTIP ── */
    [data-tooltip] { position: relative; }
    [data-tooltip]:hover::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: 120%;
      left: 50%;
      transform: translateX(-50%);
      background: var(--text);
      color: var(--bg);
      padding: 4px 10px;
      border-radius: 5px;
      font-size: 0.68rem;
      white-space: nowrap;
      z-index: 99;
      pointer-events: none;
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* ── RESPONSIVE ── */
    @media (max-width: 800px) {
      .main-container { flex-direction: column; }
      .image-panel, .quiz-panel { flex: auto; height: 50%; }
      .image-panel { flex: 0 0 40%; }
      .topbar .logo { font-size: 0.9rem; }
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .q-card { animation: fadeInUp 0.2s ease both; }
    .q-card:nth-child(1) { animation-delay: 0ms; }
    .q-card:nth-child(2) { animation-delay: 30ms; }
    .q-card:nth-child(3) { animation-delay: 60ms; }
    .q-card:nth-child(4) { animation-delay: 90ms; }
    .q-card:nth-child(5) { animation-delay: 120ms; }
    .q-card:nth-child(6) { animation-delay: 150ms; }
    .q-card:nth-child(7) { animation-delay: 180ms; }

    /* ── TOAST ── */
    .toast-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .toast {
      padding: 10px 18px;
      border-radius: 10px;
      font-size: 0.82rem;
      font-weight: 600;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      box-shadow: var(--shadow);
      animation: toastIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .toast.success { border-color: var(--success); color: var(--success); background: var(--success-light); }
    .toast.danger { border-color: var(--danger); color: var(--danger); background: var(--danger-light); }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }
  </style>
</head>

      { text: "What is broken?", options: ["A", "B", "C"], correct: 0, script: "Man: I'm terribly sorry, Mum - I've just broken something.\nWoman: Oh dear - what was it?\nMan: Well, I got up too quickly from the table to answer the phone and knocked one of your plates on to the floor - at least it wasn't your new lamp!\nWoman: Ah - I thought I heard a crash." },
      { text: "Where are the man's shoes?", options: ["A", "B", "C"], correct: 2, script: "Man: Have you seen my old shoes? I thought they were under the chair by the television.\nWoman: Not any more! They're by the door with the other rubbish. I've been tidying the flat.\nMan: Well, the living room looks very nice ... but you're not throwing my old shoes away, all the same." },
      { text: "What will Paul get at the shop?", options: ["A", "B", "C"], correct: 2, script: "Woman: ... Right, now what do we need for this sauce so Paul can get it for me ... let me see ... onions, tomatoes, one red pepper, mushrooms and two carrots ... so what have I got... onions ... I've always got those ... tomatoes ... yes ... red pepper... no, I'll need one of those ... I've got mushrooms ... oh dear... no carrots ... Paul, could you go to the shop for me please?" },
      { text: "How were they told to do their homework?", options: ["A", "B", "C"], correct: 0, script: "Boy: Wow, your homework looks great!\nGirl: Thanks ... I typed it on my Dad's computer.\nBoy: But didn't Mrs Smith tell us we had to write it in our books?\nGirl: Oh no, you're right!... Oh, what am I going to do now?" },
      { text: "What did Helen buy?", options: ["A", "B", "C"], correct: 1, script: "Woman: Look, Roger - I've been shopping. They've got some great things in Style Right.\nMan: Hey! That's brilliant. Lovely colours and it'll keep you warm in the winter.\nWoman: Yes - but are the sleeves too short for me?\nMan: No - they look fine." }
    ]
  },

      { text: "How did the woman get to work today?", options: ["A", "B", "C"], correct: 1, script: "Woman: Oh, I'm so sorry I'm late - I missed the bus. I was trying to decide whether to walk or go back and get my bike when I saw my neighbour. Luckily he offered me a lift, because he works near here." },
      { text: "Where does the pollution come from?", options: ["A", "B", "C"], correct: 2, script: "Woman: The stream is really dirty by the time it reaches the valley but we've discovered where the pollution comes from. We already knew that the water was pure in the mountains at the top so we realised the pollution must come from somewhere in the forest. There is a village above the forest but we tested the water there and it was fine." },
      { text: "When must the boys get on the coach?", options: ["A", "B", "C"], correct: 0, script: "Man: The football match starts at 2.30 but we should get there at half past one. The coach will pick us up at ten to one as it'll take us about 40 minutes to drive there. So we'll meet in the school car park. Don't be late, boys, will you!" },
      { text: "What fruit do they take?", options: ["A", "B", "C"], correct: 2, script: "Boy: Mum, have we got any fruit to take on the picnic? There were some oranges and bananas.\nMother: Here are the bananas. Let's take those. Oh ... the oranges have all gone. What about taking some grapes or apples as well?\nBoy: OK, let's take the grapes. That'll be enough." },
      { text: "Which present has the man bought?", options: ["A", "B", "C"], correct: 0, script: "Girl: Is the book in this bag for Mum, then? I didn't think she was particularly interested in flowers.\nFather: I thought she'd like it - to give her some good ideas for the garden. And even if she never reads it - it's got some lovely photos.\nGirl: I thought you were going to get those gloves I showed you in that shop last Saturday. They match the scarf I've bought her." },
      { text: "Where are the photographs?", options: ["A", "B", "C"], correct: 2, script: "Woman: Have you seen my new passport photographs? I put them on the bookshelf. Oh here they are, with your coffee cups. I hope they aren't dirty.\nMan: Oh sorry, I was showing them to Pat. He says they make you look like that newsreader on the television!" },
      { text: "What did Ben break?", options: ["A", "B", "C"], correct: 2, script: "Mother: Ben, what's this broken cup doing here?\nBoy: Sorry, Mum, I had an accident when I was washing up. You know those big dinner plates?\nMother: You haven't broken them as well!\nBoy: Just a couple. They slipped out of my hands into the sink and the cup got broken as well." }
    ]

      { text: "What time will the flight leave?", options: ["A", "B", "C"], correct: 2, script: "Woman: This is an announcement for all passengers on the 10.35 flight to Rome, flight number BA 934. We regret that due to engine problems there will be a one hour delay; the new departure time will be 11.35. Please wait in the departure lounge until you are called." },
      { text: "Which is the photo of the girl's father?", options: ["A", "B", "C"], correct: 1, script: "Woman: Have I shown you this amazing old photo of my father I found the other day?\nMan: Let's see. Wow! Is that really him?\nWoman: Yes it is! He had a lot of hair in those days, didn't he, and he didn't wear glasses like he does now." },
      { text: "What must the woman wear at work?", options: ["A", "B", "C"], correct: 2, script: "Woman: I have to wear a uniform at work. It's an ordinary white dress, with short sleeves and an open neck. It's also got a blue belt. It's quite nice." },
      { text: "Where will they sit in the theatre?", options: ["A", "B", "C"], correct: 2, script: "Man: Hello. I'd like to book a couple of tickets for tonight's show. We don't want to sit too near the stage. We were at the front last time we went and it was too near the actors. We'd like to be about half way back - oh - and to one side - not in the centre." },
      { text: "How did the woman cook the onions?", options: ["A", "B", "C"], correct: 2, script: "Man: These onions are lovely. How did you cook them? They're not fried surely? They must be grilled or baked.\nWoman: I've never heard of grilling onions!\nMan: Or maybe you boiled them?\nWoman: I just put them in the oven. It's the best way, actually." },
      { text: "What will the man buy?", options: ["A", "B", "C"], correct: 0, script: "Man: I'm just going out for a newspaper. Can I get you anything?\nWoman: It's Sarah's birthday today. I've got her a card, but can you buy her some flowers or some chocolate?\nMan: She'd prefer a nice plant. I'll get that.\nWoman: OK then." },
      { text: "How will they travel to Edinburgh?", options: ["A", "B", "C"], correct: 1, script: "Man: Are you going to take the train up to Edinburgh?\nWoman: We've booked tickets on the coach, actually. We wanted to drive up there, but we've been having problems with the car and we can't afford to fly." }
    ]
  },

    questions: [
      { text: "Which activity will the family do this year?", options: ["A", "B", "C"], correct: 1, script: "Woman: We're going to try an activity holiday this year, but we all want to do something different. The children want to go cycling but their father wants to go on a water sports holiday, you know, sailing and windsurfing, things like that. And I'd like to go walking. We all want to go together so we've decided to let the children choose this year, and we'll choose next year." },
      { text: "Which is the woman's house?", options: ["A", "B", "C"], correct: 0, script: "Man: How will I recognise your house when I call for you, Sue?\nWoman: Well, it's the same as all the others in the street, but look out for a big tree. It's by the front gate and it's covered in lovely white flowers at the moment." },
      { text: "Why will drivers have problems this morning?", options: ["A", "B", "C"], correct: 2, script: "Man: And on to this morning's local traffic news. Driving conditions have improved now that the early morning fog has gone. Rain is forecast for tonight but it will be fine during the day. The police have warned drivers to expect delays coming into town because of repairs to Victoria Bridge and advise lorries to find another route if possible." },
      { text: "What time will Robin leave the house?", options: ["A", "B", "C"], correct: 1, script: "Woman: Oh Robin! Pete's just rung to say that he'll be here a bit later than he said. The plane's going to take off at eight o'clock now so you don't need to check-in until about quarter past seven. He said he'd be round to pick you up at half past six instead of six o'clock. Is that OK? It'll give you some more time to pack anyway!" },
      { text: "What did Simon do this morning?", options: ["A", "B", "C"], correct: 2, script: "Woman: Oh Simon, you haven't even washed the dishes. Have you done anything this morning?\nBoy: I've been really busy, Mum. I paid the window cleaner who called and I was going to put away all the shopping you bought yesterday but Pete rang and he kept me talking for ages." },
      { text: "What hasn't the girl packed yet?", options: ["A", "B", "C"], correct: 2, script: "Woman: Have you got everything you need for your holiday?\nGirl: Well, I've packed my soap and toothbrush if that's what you mean, but I can't find any toothpaste anywhere.\nWoman: There's probably some in the bathroom cupboard. But what about a towel, have you remembered to pack that?\nGirl: Of course." },
      { text: "What has the woman just bought?", options: ["A", "B", "C"], correct: 0, script: "Woman: What do you think? I found it in that new department store yesterday. I think it's perfect. It'll keep the sun off my face and it'll go really well with the dress I'm wearing to the wedding. It's the same colour as my bag, too. I just need a new jacket now." }

    questions: [
      { text: "How much is the man's ticket?", options: ["A", "B", "C"], correct: 1, script: "Man: Can you tell me how much a ticket is for Saturday's performance of Macbeth?\nWoman: The front stalls and the circle are the most expensive at 16.50. The middle seats in the stalls cost 15 and the back three rows cost 12.50, but the view isn't so good. All seats are 10 for students.\nMan: I'll have one in the middle please. I'm not a student. I've got my credit card here." },
      { text: "What will they have for lunch?", options: ["A", "B", "C"], correct: 1, script: "Man: It's chips for lunch. What would you like with them?\nWoman: Not fish again, please, and we had chicken last night.\nMan: Well, we've got plenty of sausages, but we've finished the eggs, I'm afraid.\nWoman: That's decided then." },
      { text: "Why was the man late home?", options: ["A", "B", "C"], correct: 0, script: "Woman: Hi! Have you had a busy day at the office?\nMan: Yes, sorry I'm late. I didn't get the bus because Pete offered me a lift. We didn't realise the motorway was closed because of a lorry accident, so it took much longer than normal. I'll be even later tomorrow with the train strike." },
      { text: "What was the weather like on John's holiday?", options: ["A", "B", "C"], correct: 0, script: "Man 1: How was your holiday, John?\nMan 2: We had a good time, but the weather was awful. We didn't have one sunny day!\nMan 1: Oh dear, a week in the rain, poor you.\nMan 2: Well, that's the funny thing. It never actually rained, it was just freezing cold and cloudy, we thought it might even snow." },
      { text: "What time was the woman's appointment?", options: ["A", "B", "C"], correct: 1, script: "Woman: I've had an awful morning! I was really late for my hospital appointment. I just missed the 9 o'clock bus, and the next one didn't come until 20 to 10. I was supposed to see the doctor at 10 past 10, but I didn't arrive until half past. He wasn't very pleased." },
      { text: "What did the woman buy?", options: ["A", "B", "C"], correct: 2, script: "Man: Did you get anything from the duty-free shop?\nWoman: Well, I really wanted some of that perfume I bought last time and I got a large bottle. Then I looked for the walkman I'd promised I'd get for Tony. Fortunately, they'd sold all of them, so I had enough money for a lovely silk scarf for myself. I completely forgot about the chocolates I was supposed to get for Mary." },
      { text: "Where are the man and the woman talking?", options: ["A", "B", "C"], correct: 2, script: "Woman: It's a bit crowded isn't it... worse than a football match! Can you see well enough from here?\nMan: It doesn't matter - as long as I can hear and get down the important points of what he says, it's OK.\nWoman: I'm going to the library after this. I want to get this report finished so that I can go to the cinema." }
    ]
  },

    questions: [
      { text: "What is the man going to buy?", options: ["A", "B", "C"], correct: 1, script: "Woman: Is everything ready for the holiday?\nMan: I'm just going shopping - I must get those pills I take when I feel travel sick. Do we need anything else at the chemist's? We forgot the toothpaste last time!\nWoman: I've got that. I haven't got any sunglasses, but I can borrow yours, can't I? And I'll get something to read at the airport.\nMan: Right." },
      { text: "Which dress is Kate talking about?", options: ["A", "B", "C"], correct: 2, script: "Girl: Oh Mum, this dress is still dirty!\nWoman: It can't be, Kate - I've only just washed it.\nGirl: Well it is. The mark on the collar has gone, but there's still a small one here - look it's at the front just below the button. It's where I spilt some Coke last week." },
      { text: "When will Jane meet them?", options: ["A", "B", "C"], correct: 2, script: "Man: Hi, it's Pete here. Jane left a message to say she can't meet us at 8.00 as planned, because her bus doesn't get in till 8.15 and it'll take her 30 minutes to get from the centre of town. I told her the table is actually booked for 8.45 so that would be fine and we'll see her then." },
      { text: "Which morning activity is for beginners?", options: ["A", "B", "C"], correct: 1, script: "Man: At 10.00 a.m. tomorrow morning there will be swimming lessons, at both intermediate and beginner level. Then there will be volleyball practice at 11.30 for all those of you who are already in one of the teams. Also in the morning, for those of you who already know how to sail, there's a chance to do some practice on your own. There will be lessons in both sailing and windsurfing for beginners after lunch." },
      { text: "Which painting does the woman decide to buy?", options: ["A", "B", "C"], correct: 0, script: "Woman: They're all nice, but you see a lot of flowers everywhere these days, don't you, so that wouldn't be my choice. The same goes for animals actually, although I do quite like the one of the horses. So, it looks like it'll have to be the one with the boats. It will be a change from that bowl of fruit I've had on the wall all these years, anyway." },
      { text: "What is the man selling?", options: ["A", "B", "C"], correct: 0, script: "Man: And this is the latest model by Macpoint. You'll find it's even quicker at doing your washing up and needs less water. And it's very easy to use - as easy as turning on your shower." },
      { text: "What is the weather forecast for tomorrow?", options: ["A", "B", "C"], correct: 0, script: "Woman: ... it's been typical spring weather today, sunshine and showers. The next twenty-four hours should be dry but cloudy ... Things look better for the next week, with Monday being a fine sunny day and the following day mild but windy." }
    ]

    questions: [
      { text: "Where will the woman go first after work?", options: ["A", "B", "C"], correct: 1, script: "Man: Are you and Sarah going straight to the restaurant from work tonight?\nWoman: Actually, I'm leaving work early because I need to do some shopping in the market, and I'm going to meet Sarah after that outside the cinema. She doesn't know where the restaurant is, you see. You're playing tennis after work, aren't you?\nMan: Yes. So I'll see you at the restaurant." },
      { text: "What can festival visitors see every day?", options: ["A", "B", "C"], correct: 1, script: "Woman: The Arts Centre in London is holding a festival of Irish culture from the 4th to 12th of April. An exhibition of paintings is open daily and on some weekday evenings the Theatre has special events including plays and films. At the weekend, concerts of Irish music will take place in the Town Hall." },
      { text: "What souvenir will the boy's mother bring?", options: ["A", "B", "C"], correct: 2, script: "Woman: What colour T-shirt shall I bring you from New York, Fred?\nBoy: I'd prefer black but... actually a baseball cap would be a good idea.\nWoman: Mmm. Or what about another model car for your collection? I could get you a New York taxi.\nBoy: Great. I really liked the sports car you bought me last time." },
      { text: "What time is the woman's hair appointment?", options: ["A", "B", "C"], correct: 0, script: "Woman 1: I'd like to make an appointment to have my hair cut please. This Friday or Saturday in the morning if you can manage it.\nWoman 2: Let me see ... we can do Friday at 10.00 or 11.30, then on Saturday there's 9.30 or 12 o'clock.\nWoman 1: I'll take the earlier one on Saturday please." },
      { text: "Where's the TV guide?", options: ["A", "B", "C"], correct: 2, script: "Woman: Have you seen the TV guide?\nBoy: Isn't it on top of the television? I had it when I was watching the film last night.\nWoman: I expect you left it by your chair then. Here it is under the cushion where nobody can find it. You should put it back in its place by the telephone. Then we'd all know where it is." },
      { text: "What does the man decide to take Tracy?", options: ["A", "B", "C"], correct: 1, script: "Man: I'm going to see Tracy in hospital, but I can't think of what to take her. People always take flowers ...\nWoman: ... so she'll have lots already for sure. I always think it's nice to have something to read myself, but as Tracy's got her Walkman with her, what about something to listen to?\nMan: What a good idea. It's better than taking sweets, certainly, because I know she's on a special diet while she is in hospital." },
      { text: "Which sport has the man just started?", options: ["A", "B", "C"], correct: 2, script: "Woman: Hi, how was your holiday?\nMan: Great, really good windsurfing and sailing - you know how much I enjoy them. And horse-riding ... I really want to go again now I've tried it. And the swimming pool was wonderful too - much warmer than the one I usually swim in ... holidays are just too short!" }

    questions: [
      { text: "Which sport will the woman learn on holiday?", options: ["A", "B", "C"], correct: 2, script: "Man: ... So if you're interested in water sports, this hotel has two pools, diving boards, and its own private beach. You can learn to water ski there, and guests can windsurf too - although the hotel advises beginners to take a few lessons before going out on their own.\nWoman: Good. I'm quite a strong swimmer, and I have always wanted to try windsurfing, so that would suit me fine. I tried water skiing once, but I didn't like it.\nMan: Well, I'm sure you'll enjoy your stay there then.\nWoman: Good." },
      { text: "What does the girl's penfriend look like now?", options: ["A", "B", "C"], correct: 1, script: "Woman: Look at these photos of my penfriend and her family. I took them during the trip.\nMan: So is she the one with long hair?\nWoman: Oh, that's her sister. This is her, next to me. She looks a lot like her sister, though, doesn't she? And they used to have hair the same length, but hers has always been curly. It's a shame she had it cut, though - I think it looked better when it was long." },
      { text: "Which animals did the children see?", options: ["A", "B", "C"], correct: 2, script: "Woman: Well, the zoo was a bit disappointing. The children enjoyed feeding the horses and watching the monkeys and the birds, but they hoped to see lions and tigers, and there weren't any. Someone told us they don't have them there because the security isn't good enough, but I don't know if that's true." },
      { text: "Which TV programme is on first?", options: ["A", "B", "C"], correct: 1, script: "Woman: ... and welcome to our Tuesday evening programmes. At 9.00 we'll have the first of our new programmes on sport, and today you can see live the final of the international tennis cup. But before that we have singer, Jane Shelley in concert. She will perform songs from her new CD. This will be followed by today's news from around the world ..." },
      { text: "What does the boy decide to buy for his grandmother?", options: ["A", "B", "C"], correct: 0, script: "Boy: My mum says I've got to buy my granny a present because she always gets me one when she goes on holiday. I thought I'd get her a black T-shirt.\nGirl: Don't be silly, old ladies don't wear T-shirts. Why not get her some of the local perfume. It smells of roses, or one of those little wooden boxes - they're great for keeping earrings and stuff in.\nBoy: That's a good idea. She does a lot of travelling, so she can use it to put her jewellery in." },
      { text: "What time is the man's appointment?", options: ["A", "B", "C"], correct: 1, script: "Woman: Hello. Appointments.\nMan: Hello. Could I make an appointment to see Dr. Smith, next Tuesday please? Early evening, if possible - anything after 6 o'clock.\nWoman: Well, we open at 6.15 on Tuesday evenings, and there's an appointment at 6.35 or 6.50.\nMan: Thanks. I'll take the earlier one. My name's ..." },
      { text: "What has the woman lost?", options: ["A", "B", "C"], correct: 1, script: "Woman: Excuse me, I was sitting over there ten minutes ago making a call on my mobile phone. I got a pen out of my bag to write something down and I think my purse fell out. I can't find it now. Has anyone handed it to you?" }

    {
    id: 15,
    pages: ["images/part1_test15_page1.jpg", "images/part1_test15_page2.jpg", "images/part1_test15_page3.jpg"],
    audioUrl: "https://res.cloudinary.com/dypsrwyne/video/upload/part1_test15_nlkkeo.mp3",
    questions: [
      { text: "What is the weather forecast for tomorrow?", options: ["A", "B", "C"], correct: 2, script: "Man: And now for the weather. As we go through today, the temperature will slowly rise, and the snow we've had for the last few days will disappear by the end of the afternoon. Tomorrow we can expect some rain, but by the end of the week, some sunny weather is likely." },
      { text: "What will they buy at the supermarket?", options: ["A", "B", "C"], correct: 0, script: "Woman: Look, Kate, there are some of those biscuits you like!\nGirl: Oh, yes. Mmm ... they're a bit expensive, though, Mum. Why don't we have this cake instead? Remember we've got guests coming tomorrow.\nWoman: Oh, I haven't forgotten. I've already made a cake, and I've bought lots of ice cream for the children.\nGirl: Well, I suppose the biscuits would be nice with ice cream. Let's see ... oh, good. I've got enough money in my purse." },
      { text: "Which T-shirt does the woman buy?", options: ["A", "B", "C"], correct: 0, script: "Woman: I'd like to buy a white T-shirt with short sleeves, please. Large size.\nMan: I'm afraid the white ones have long sleeves, but we've got short sleeves in the darker colours. Do you want a round neck or a V-neck?\nWoman: It must be round neck. Let me think ... umm, OK, I'll take one of the short-sleeved ones - the colour's not so important really." },
      { text: "What will the girl take with her on holiday?", options: ["A", "B", "C"], correct: 1, script: "Man: Have you packed for your holiday?\nWoman: No, I need to go shopping before I can do that. Last holiday, my suitcase handle got broken, so I need something that's better quality this time. But suitcases are so heavy to carry.\nMan: I always take a big sports bag - it's light, and not expensive, so it doesn't matter if it gets torn.\nWoman: Yes, I thought about one of those, but you need something stronger when it's going on a plane. I'll get something I can put on my back - you can carry more that way." },
      { text: "Which exercise is the teacher describing?", options: ["A", "B", "C"], correct: 0, script: "Woman: OK everybody. This next exercise is a bit difficult, but it's really good for your legs. All you do is put your back against the wall... place your feet about half a metre away from the wall... move your back down the wall, so your knees are bent at 90 degrees. Now put your hands out straight in front of you ... right... make sure your head is against the wall. Now, see how long you can stay like that! If you do two minutes, you're doing well." },
      { text: "What time will the train to London leave?", options: ["A", "B", "C"], correct: 2, script: "Man: The train arriving at platform six is the 4.45 from London. The train due to arrive at platform four in approximately five minutes is the delayed 4.30 train to London. This train will now depart at 4.50 and travel non-stop. We apologise to passengers for the delay. Refreshments will not be available on this train." },
      { text: "Which sport will the boy do soon at the centre?", options: ["A", "B", "C"], correct: 2, script: "Boy: Have you been to the new watersports centre yet?\nGirl: Oh yes, it's brilliant. There are two indoor pools, one for diving and one for swimming, and you can also have sailing lessons on the lake.\nBoy: That's what I'm doing there next weekend, actually. I was hoping to take windsurfing lessons, but the leaflet says they're not starting those until next year." }
    ]
  },
    {
    id: 16,
    pages: ["images/part1_test16_page1.jpg", "images/part1_test16_page2.jpg", "images/part1_test16_page3.jpg"],
    audioUrl: "https://res.cloudinary.com/dypsrwyne/video/upload/part1_test16_xatzq1.mp3",
    questions: [
      { text: "Which of Miranda's things will Lucy be able to use?", options: ["A", "B", "C"], correct: 1, script: "Woman: Lucy's joining the tennis club, so that'll be more equipment I have to buy.\nMan: Oh well, don't waste too much money. We bought Miranda everything, but then she only went once because she didn't like the teacher. Actually, I think we've still got some of it somewhere. There's a box of balls in the cupboard certainly, but she gave her cousin the racket, and she wears the shoes for other things. But I could look in the cupboard and give you what's there.\nWoman: Oh thanks, that'd be great. That would be really helpful." },
      { text: "What can't the woman find?", options: ["A", "B", "C"], correct: 2, script: "Woman: I'm going to mend and paint the shelves in your bedroom today.\nMan: Great, Mum. Anything I can do to help?\nWoman: Yes, can you go to the shop and get me a new paint brush - this one's too old. But before you do that, ask your father what he's done with the hammer - I've looked everywhere for it. There was nothing in the toolbox except this pair of scissors which I lost months ago!" },
      { text: "Which ring has the woman lost?", options: ["A", "B", "C"], correct: 1, script: "Woman: I wonder if you can help me? I ate here in this restaurant last night, and I think I left my ring in the bathroom when I washed my hands. Have you seen it? It's got a square bluey-green stone with lots of smaller stones round it. It's quite valuable but that's not the point - it was my grandmother's and I'd hate to lose it." },
      { text: "What time did the girl arrive?", options: ["A", "B", "C"], correct: 0, script: "Man: Sorry I'm late - have you been here long?\nWoman: Well... not really, about five or ten minutes perhaps. I left home at five past six and got here at exactly quarter to seven.\nMan: Well... if we hurry, we'll still make it for the beginning of the film at seven." },
      { text: "What will be on television at 10 o'clock this evening?", options: ["A", "B", "C"], correct: 2, script: "" },
      { text: "What did the man buy?", options: ["A", "B", "C"], correct: 0, script: "" },
      { text: "What did the man buy?", options: ["A", "B", "C"], correct: 0, script: "Woman: Oh, good, you're home! Did you get all the shopping? How about the orange juice?\nMan: Well, actually, at first I thought the shop didn't have any orange juice. I was thinking we'd have to manage without. Then I realised they'd moved it to a different shelf. I hope this is enough.\nWoman: Don't worry, that's plenty. Did you find the grapes?\nMan: Yes, there were lots of grapes. Only they looked a bit sour, so I got strawberries instead. They were a bit expensive, though." }
    ]
  },
    {
    id: 17,
    pages: ["images/part1_test17_page1.jpg", "images/part1_test17_page2.jpg", "images/part1_test17_page3.jpg"],
    audioUrl: "https://res.cloudinary.com/dypsrwyne/video/upload/part1_test17_uoeffp.mp3",
    questions: [
      { text: "Where will they meet?", options: ["A", "B", "C"], correct: 1, script: "Girl: Hi, it's Maria. Got your message. Yeah, I'd like to go to the movies. There's a film called Lightworld Two, or a comedy - I don't mind which ... Shall we meet outside the cinema?\nBoy: Or, I know, at the coffee bar on the corner, we could have a snack before we go in. We could meet at the bus stop.\nGirl: Mum's driving me into town this afternoon, to buy some trainers, so I won't have to get the bus. But something to eat first is a good idea. Shall we say six o'clock?\nBoy: OK." },
      { text: "What has the girl forgotten to bring?", options: ["A", "B", "C"], correct: 2, script: "Boy: Drink up your coffee - we'll be late for class. What are you looking for now? Don't tell me you've left your essay at home. You said you were working on it till midnight.\nGirl: Don't worry, it was the first thing I put in my bag - look, here it is. I won't be a second ... just checking everything. Pen ... now where did I...? Oh dear, you'll be able to lend me one, won't you? Keys? - oh, here they are, in my pocket as usual." },
      { text: "Which TV programme is on at nine o'clock tonight?", options: ["A", "B", "C"], correct: 0, script: "Woman: Because of the ski jumping finals we're late finishing, so there are some changes to this evening's programmes. We won't now show the Nature Programme, about the dolphins found near the Florida coast, at nine o'clock. Instead, Tim Wong's Chinese Kitchen will be at this time, an hour later than advertised. You can see the Nature Programme at its usual time next week." },
      { text: "How will the man book tickets for the show?", options: ["A", "B", "C"], correct: 2, script: "Woman: Shall we go to the Boat Show? It's on for three weeks - but you need to book if you want to go on the first night because there's a party.\nMan: Really? Let's go. How do you book?\nWoman: On the Internet or by phone ... or there's a form to fill in, in this week's TV magazine with a discount on each ticket.\nMan: I like saving money, but the post's always so slow. I prefer to talk to someone when I'm making a booking - just leave it to me." },
      { text: "What will the man do this winter?", options: ["A", "B", "C"], correct: 1, script: "Woman: Will you go on working as a gardener when winter comes, Jim? You'll get very cold and wet working outside.\nMan: Well, last winter I took a job in a supermarket. They're advertising for staff again at the moment, but I prefer being in the fresh air - even when the weather's bad. I'd really like to get a job abroad in the sun, but all the ones I've seen need building skills, which I haven't got. So I'll just stay in my present job for the time being." },
      { text: "How does the man want the woman to help him?", options: ["A", "B", "C"], correct: 2, script: "Man: Sarah, could you do something for me?\nWoman: Well, it depends what it is.\nMan: I want to clean the bedroom windows this afternoon, but I lent the ladder to John ... could you give me a lift to his house and then bring me back with the ladder?\nWoman: Of course - no problem." },
      { text: "Which house did the woman stay in?", options: ["A", "B", "C"], correct: 0, script: "Woman 1: I love these photos of your holiday. Is this the house you stayed in? I love the balconies and all those plants growing up the walls. Oh, and there's a lovely big swimming pool.\nWoman 2: Let me see. Oh, you're looking at the wrong photo - that was the house our friends stayed in. Ours was exactly like that one, but we only had the sea to swim in. Here, let me show you a photo of our house. It was just as nice." }
    ]
  },
    {
    id: 18,
    pages: ["images/part1_test18_page1.jpg", "images/part1_test18_page2.jpg", "images/part1_test18_page3.jpg"],
    audioUrl: "https://res.cloudinary.com/dypsrwyne/video/upload/part1_test18_c0wpv9.mp3",
    questions: [
      { text: "Where are the dictionaries?", options: ["A", "B", "C"], correct: 0, script: "Man: As this is your first visit to the library, I'll show you round. As you can see, shelves are clearly labelled according to subject. Most books you may take home with you but some, such as foreign language dictionaries, must stay in the library. These can be found over there behind the computers and it's best if you take them to the desks by the window and study them there. Or you can use these armchairs if you prefer to sit somewhere more comfortable." },
      { text: "Which evening dress does the woman decide to wear?", options: ["A", "B", "C"], correct: 1, script: "Man: Why are you taking so long to decide what to wear tomorrow night? The black dress with the long sleeves will be fine!\nWoman: Mmm ... Long sleeves are a bit uncomfortable, but yes, it's a nice dress. Trouble is, I've lent my short-sleeved dress to Angela. That would be perfect, it's a long dress with a wide belt... Anyway, let's see what I've got here ... this one, also black, short-sleeved - but it's got white flowers on the sleeves.\nMan: Why don't you phone Angela and get your dress back?\nWoman: Yes, I think I will." },
      { text: "What is the man's job now?", options: ["A", "B", "C"], correct: 2, script: "Man: When I was young, I used to paint. I always dreamed of being an artist, painting pictures for a living. But I didn't do very well at school and so I left early to join my dad working in the family photography business. After a few years of that I got bored, and felt I wanted to go back and study. That's when I did my degree and teacher training, and I've taught photography ever since, although I still paint in my spare time." },
      { text: "Which calendar will the boy buy?", options: ["A", "B", "C"], correct: 0, script: "Boy: Mum asked me to buy her a calendar. Shall I get this one with pictures of mountains, or this one with boats on it?\nGirl: She loves sailing, so get that one. I like that one with wild animals, but I don't suppose Mum would. And you can't get the one with mountains because she had that last year.\nBoy: Yes, I know. I'll get the one you suggested then." },
      { text: "What time will the writer arrive at the bookshop?", options: ["A", "B", "C"], correct: 1, script: "Man: All fans of Peter Robbins should go to the South Street book store tomorrow afternoon, where Peter will sign copies of his book Love of Life and answer questions. He is expected at a quarter past two and promises to stay until half past three, when he has to leave for another appointment. Get there as soon as you can because, if it's anything like Peter's last visit, queues will start to form at quarter to two or even earlier. Don't miss this opportunity to meet everyone's favourite writer." },
      { text: "What did the woman leave in the restaurant?", options: ["A", "B", "C"], correct: 0, script: "Man: Hello ... back again. Did you leave something behind?\nWoman: Yes. I don't know if you remember but when I wanted to pay the bill I couldn't find my purse, so I emptied everything out of my bag to look for it, and that's when I took my keys out. When I got back to the car, I realised they weren't in my bag ...\nMan: Which table were you sitting at?" },
      { text: "Where is the bicycle?", options: ["A", "B", "C"], correct: 1, script: "Boy: I think someone's stolen my bicycle. I left it by that tree on the pavement, but it's not there any more.\nGirl: Perhaps it got in my father's way when he was parking his car.\nBoy: Oh yeah, I think you're right. It's on the other side of the road, by that street light. He probably moved it. I'll remember to leave it well away from the tree in future!\nGirl: Yes, and lock it next time as well." }
    ]
  },
    {
    id: 19,
    pages: ["images/part1_test19_page1.jpg", "images/part1_test19_page2.jpg", "images/part1_test19_page3.jpg"],
    audioUrl: "https://res.cloudinary.com/dypsrwyne/video/upload/part1_test19_qbknke.mp3",
    questions: [
      { text: "What regular exercise does David do at the moment?", options: ["A", "B", "C"], correct: 2, script: "Cathy: You're looking well, David! Have you been to the gym a lot recently or something?\nDavid: Well, I joined a gym earlier this year, but I stopped going - it was just too difficult. And expensive, too! I've done a lot of swimming instead, and I feel much better for it!\nCathy: It shows! I'm thinking of taking up tennis again. Would you be interested in a game one day? You used to be quite good, didn't you?\nDavid: Well, I haven't played for a long time but... why not?" },
      { text: "What should Suzie take to Emma's house?", options: ["A", "B", "C"], correct: 0, script: "Woman: Suzie? It's Emma. We've got to make some paper flowers so the classroom looks nice for the end-of-term party. Can you come to my house this evening to help me do it? There's some paint left over from last time, but I can't find any brushes. Have you got one? Bring it if you have. And if we have a pair of scissors each, we can work faster, so don't forget yours. We'll need coloured paper, but I'm getting that from college. See you around six." },
      { text: "Which kind of T-shirt did the boy choose?", options: ["A", "B", "C"], correct: 1, script: "Girl: Look, it's your present. Just choose a T-shirt and then you can have anything you like printed on it. They've got three types - a picture like this one with boats on, or there are some with words, and this type has shapes on it.\nBoy: Well, I really don't like writing - it makes me feel like an advertisement! And those pictures are awful...\nGirl: Right then, I know which one you'll choose ..." },
      { text: "What frightened the man?", options: ["A", "B", "C"], correct: 1, script: "Woman: How was your camping holiday in Africa?\nMan: Oh ... fantastic ... we saw all sorts of wildlife. You know, lots of lions and all that.\nWoman: Wasn't it frightening with all those animals so close to your tent?\nMan: Not really, to be honest, what scared me most were the bats ... they flew so close at night... I thought I'd be frightened of all the other things like elephants ... but in the end I wasn't because we only saw them during the day and they were mostly quite a long way away." },
      { text: "Where is the man calling from?", options: ["A", "B", "C"], correct: 2, script: "Man: Hello, Mary. Could you come and collect me? I went to a client's house by taxi, and I can't get one back.\nWoman: Sure, where are you exactly?\nMan: You know the bridge over the river on the North Road? If you go over that and take the first left, you see a bar on the right. I'll be waiting there. I'm actually in the farmhouse down the road from there at the moment - Mrs Collins has been kind enough to let me use her phone.\nWoman: Fine, see you in the bar soon." },
      { text: "How did the woman spend her last holiday?", options: ["A", "B", "C"], correct: 2, script: "Man: You're looking well. How was your holiday in the mountains?\nWoman: Not so good. I hurt my foot on the day I arrived, so climbing was just impossible. While everyone else was going off to the mountains, I stayed and read a book by the hotel pool... not my idea of a good holiday ...\nMan: Sorry to hear that. Well, at least you had a good rest... Is your foot better now?\nWoman: Not really. I sit and watch television a lot and try to be patient." },
      { text: "Where is the girl's purse?", options: ["A", "B", "C"], correct: 0, script: "Girl: Mum, I'm just off to the shop. Oh, wait a minute, where's my money?\nWoman: Oh, I found your purse lying on the table earlier, so I put it back in your bag.\nGirl: Well, it's not in there now. Maybe it's fallen on the floor somewhere. Can you help me look under the sofa? That's where I was sitting a minute ago. Just a minute, let me check. Yes, look, it is in here after all. I told you that's where I'd put it. You just didn't look properly!" }
    ]
  },
    {
    id: 20,
    pages: ["images/part1_test20_page1.jpg", "images/part1_test20_page2.jpg", "images/part1_test20_page3.jpg"],
    audioUrl: "https://res.cloudinary.com/dypsrwyne/video/upload/part1_test20_czz4oy.mp3",
    questions: [
      { text: "What did the thieves steal?", options: ["A", "B", "C"], correct: 2, script: "Woman: What exactly is missing, sir?\nMan: I thought the thieves had taken the television set, because it wasn't in its usual place in the dining room. Then I went to check my CD player and CDs - I keep them on an antique chest of drawers. All the CDs were on the floor with the CD player. But the chest had completely disappeared. It wasn't in the garden either, which is where I found the television.\nWoman: Right sir. Well, can you give me a detailed description of it?" },
      { text: "What present will they take?", options: ["A", "B", "C"], correct: 0, script: "Woman: We ought to take a present if we're staying for the weekend.\nMan: Let's get something a bit different. People always take flowers and it's rather hot for chocolates. What about something for the children, like a DVD? Or... some unbreakable glasses they can all use outside or on picnics?\nWoman: Good idea. And let's get a jug to go with them. The children have probably got lots of DVDs." },
      { text: "What will the woman eat tonight?", options: ["A", "B", "C"], correct: 1, script: "Man: Hotel York.\nWoman: Hello, I'm staying in your hotel tonight, and I'm arriving quite late, about ten thirty. Will there be any food available in the hotel?\nMan: I'm afraid the restaurant closes at ten o'clock, but the bar does burgers and chips until midnight. And there's always the pizza place opposite which stays open late. Or we can bring sandwiches to your room if you prefer.\nWoman: Fine. I won't want to eat burgers or pizza at that time of night." },
      { text: "How much will the girl's ticket cost?", options: ["A", "B", "C"], correct: 2, script: "Woman: I'm travelling from Banbury to Witney tomorrow, and I need to be there about ten in the morning. Can you tell me when the trains leave, and how much a single ticket is?\nMan: The eight thirty-five train gets in at nine forty. That's twelve pounds sixty-five for a single. The train after that leaves at nine ten and arrives at ten fifteen. That costs less because you're travelling after nine. The fare is ten pounds forty-five.\nWoman: I'll take the second train. Just after ten is fine. Thanks." },
      { text: "What is the grandmother's job now?", options: ["A", "B", "C"], correct: 1, script: "Woman: My grandmother always wanted to be a teacher when she was a little girl, but she had to leave school when she was fourteen and help her mother clean offices and shops. When she was in her thirties she went to college, but she had to work as a waitress in the evenings to pay for her studies. A few years later she finally got the job she'd always wanted and she's done it ever since." },
      { text: "Which button has the boy lost?", options: ["A", "B", "C"], correct: 1, script: "Boy: I've lost a button on my favourite shirt. I could see that it was loose when I put it on last night. If it was the one on my pocket you wouldn't notice, but on the collar it's different. It's easy to see that it's missing from there.\nWoman: Why don't you take one off your sleeve and use that. Here, you'll need some scissors. Be careful you don't cut the material.\nBoy: Okay, will you sew it on for me?\nWoman: Do it yourself! It's easy." },
      { text: "What will the man do first?", options: ["A", "B", "C"], correct: 1, script: "Man: Before we start painting I'll wash the kitchen floor because it's really dirty.\nWoman: It'll be easier if you sweep it before you do that, Nick. I'll carry on cleaning the windows.\nMan: OK, and then we can start painting the walls." }
    ]
  },
    {
    id: 21,
    pages: ["images/part1_test21_page1.jpg", "images/part1_test21_page2.jpg", "images/part1_test21_page3.jpg"],
    audioUrl: "https://res.cloudinary.com/dypsrwyne/video/upload/part1_test21_wqo8q1.mp3",
    questions: [
      { text: "How will they book their flights?", options: ["A", "B", "C"], correct: 1, script: "Man: So what about our flights then, shall I book on the internet? Or do you want to go to a travel agent's?\nWoman: Well, actually, I've already been to the travel agent's and got some prices... They can offer us a better price than anything I've seen on the internet.\nMan: Great... well let's make a decision and then go ahead and book. We could phone them, couldn't we? Or is it better to pop in?\nWoman: I'd prefer not to phone because I want to pay in cash.\nMan: Okay." },
      { text: "What has the daughter forgotten to bring on holiday?", options: ["A", "B", "C"], correct: 0, script: "Girl: Mmm ... nice bathroom in this hotel! Can I borrow your shampoo, Mum? I left mine at home.\nMum: Okay, but put it back in my bag when you've finished.\nGirl: And I don't believe it! I must have forgotten to bring my hairbrush, too. I can't find it anywhere in my suitcase. I was sure I'd put it in!\nMum: You had! I've already put it in the bathroom with your other washing things. I don't know why you brought toothpaste though. We certainly didn't need two tubes! We're only here for four days." },
      { text: "What will the man and woman do on Sunday?", options: ["A", "B", "C"], correct: 2, script: "Woman: Oh, I'm so tired! Shall we just stay at home this weekend? Maybe watch some DVDs and read the newspapers?\nMan: Mmm... how about going to the beach tomorrow with a picnic as it's so hot... although we really ought to clean the flat. Oh, I nearly forgot! Isn't your sister coming to see us on Sunday?\nWoman: Yes, you're right... she is! She'll enjoy a good day at the seaside, won't she? We'll relax at home another time... and then do the housework, too!\nMan: Sounds great!" },
      { text: "Which blouse does the girl decide to buy?", options: ["A", "B", "C"], correct: 1, script: "Girl: Tom, I need your opinion about this blouse. I like the collar, but the sleeves are rather long.\nTom: Um... I'm not sure. Look at some more before you decide. What about this one? Short sleeves, no collar.\nGirl: It's a bit ordinary. I do agree, though, it's elegant. Ah, here's one with a collar and without sleeves, but it isn't quite so nice as the other one. Hmm... no, I like the first one I saw. I can always make the sleeves shorter.\nTom: Okay. I think it's a good choice." },
      { text: "When is the girl having a party?", options: ["A", "B", "C"], correct: 2, script: "Amanda: Hello, this is Amanda. About my birthday party. I told you it was on the fifteenth, but I've got to change it to the thirteenth. That's a Thursday, which I know isn't perfect. But no-one can come on Friday the fourteenth because it's the school disco. Sorry about the change, but Mum and Dad have got something planned for me on the fifteenth. Anyway, the party's at my house, and it's starting about eight o'clock. Call me back and let me know if you can come." },
      { text: "Where is the motorcycle race going to finish?", options: ["A", "B", "C"], correct: 1, script: "Man: This year's motorcycle race will finish in the city centre. Hundreds of people are expected to be in the square in front of the town hall to watch the finish of the race on Saturday afternoon. For those who'd like to see the bikes in action, seating will be provided in the square outside the stadium. Race organisers recommend that from Castle Square, with its position on top of the hill, there'll be a good view of bikes making their way through the city." },
      { text: "What will the woman repair next?", options: ["A", "B", "C"], correct: 2, script: "Boy: I really want to go out on my bike, but it's got a flat tyre. Can you fix it?\nWoman: I'm really busy at the moment. Oh, and we don't have anything to repair it with. Can't you do something else? Why don't you play football instead?\nBoy: But the football's flat as well.\nWoman: Oh. But it just needs more air. That shouldn't take too long. I've just finished putting some new glass in the window so I'll have a coffee and then I'll do it." }
    ]
  },
    {
    id: 22,
    pages: ["images/part1_test22_page1.jpg", "images/part1_test22_page2.jpg", "images/part1_test22_page3.jpg"],
    audioUrl: "https://res.cloudinary.com/dypsrwyne/video/upload/part1_test22_wbdzax.mp3",
    questions: [
      { text: "What has the boy lost?", options: ["A", "B", "C"], correct: 1, script: "Boy: Mum - I love it here. The city's really interesting and it's quite easy to find my way round, thanks to the map you gave me - I don't know what I'd do without it. I've taken some great photos, but I left my camera on a tram so I won't be able to show you! And things are more expensive than I expected, so I don't think my money will last very long. Can you send me some more? Thanks. Speak to you again soon." },
      { text: "What time does the race begin?", options: ["A", "B", "C"], correct: 0, script: "Boy: I'm running the race on Saturday, but I don't know where it is or when it begins.\nMan: Well, you're going to run round the lake. All the runners have to meet in the car park and register by quarter to two, though the race won't actually start until half past. There should be about a hundred runners.\nBoy: When will it be over? I've got to catch a train at quarter past three.\nMan: It's 15 kilometres! You won't be on time for that!" },
      { text: "Which musical instrument does the boy play now?", options: ["A", "B", "C"], correct: 2, script: "Girl: Look at this notice. The school's starting trumpet lessons next term.\nBoy: Oh, the trumpet! That's an instrument I'd love to play. It's got a great sound.\nGirl: Yes, I might try that, or maybe piano, I don't know. You learnt piano, didn't you?\nBoy: Yes, I played the piano for years, in fact - until I took up the drums last year. You can't do everything, and I just felt they were more my sort of instrument, really." },
      { text: "What will the weather be like tomorrow afternoon?", options: ["A", "B", "C"], correct: 0, script: "Woman: And now for tomorrow's weather. The day will start showery and windy. Those winds should disappear by late morning, but the wet weather will continue until well into the evening. Although we might see some bright sunny periods between the showers early on, by midday it will be cloudy, with temperatures of no more than ten or twelve degrees centigrade." },
      { text: "What is the subject of James Wilson's book?", options: ["A", "B", "C"], correct: 1, script: "Man: This latest book by James Wilson is part of a series of practical guides for young people written by experts. The first in the series, Cookery for Beginners, was written by a well-known television cook. It's very clear and well written, and is a bestseller. Wilson's book, Computers for Beginners, is in the bookshops now and is also very popular. And there'll be a book about photography called Photography for Beginners, which will come out next year. It's written by a newspaper cameraman and will certainly be full of useful information." },
      { text: "Which part of the man's body hurts him at the moment?", options: ["A", "B", "C"], correct: 2, script: "Doctor: It's been four weeks since your accident, hasn't it? So tell me how you are feeling. How's the pain in your legs?\nMan: My legs were really hurting me until last week, but that's worn off now, I'm glad to say. So has the pain in my back. My shoulder's still fairly sore, though not as bad as it was, fortunately.\nDoctor: I'm pleased to hear that. Let's take a look at you, anyway." },
      { text: "Where was the man's knowledge of Spanish useful?", options: ["A", "B", "C"], correct: 1, script: "Woman: How was your trip, Peter?\nMan: Great. I was glad I learnt some Spanish before I went.\nWoman: Did you manage to order a meal in a restaurant?\nMan: Well, I was staying with English friends actually, and I just ate at home with them. I did manage to explain what I wanted when I went shopping though, and I was pleased about that. But I didn't manage to talk to any of the Spanish people who were invited to my friends' place - that was really disappointing. I couldn't understand what they said to me." }
    ]
  },
    {
    id: 23,
    pages: ["images/part1_test23_page1.jpg", "images/part1_test23_page2.jpg", "images/part1_test23_page3.jpg"],
