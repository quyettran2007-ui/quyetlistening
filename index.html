      // ───────── SCRIPT ─────────
      function showScript() {
        const test = getCurrentTest();
        const panel = $('#scriptPanel');
        if (!test.fullScript) {
          let txt = '';
          test.questions.forEach((q, i) => {
            txt += `Câu ${currentPart===1? i+1 : i+8}: ${q.script || '(không có transcript)'}\n\n`;
          });
          panel.innerHTML = txt;
        } else {
          let html = test.fullScript;
          (test.highlights || []).forEach(phrase => {
            const escaped = phrase.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            html = html.replace(new RegExp(`(${escaped})`, 'gi'), '<mark>$1</mark>');
          });
          panel.innerHTML = html;
        }
        panel.classList.toggle('show');
      }

      // ───────── HISTORY ─────────
      function getHistory() {
        try { return JSON.parse(localStorage.getItem('listening_history') || '[]'); } catch { return []; }
      }
      function saveHistory() {
        const test = getCurrentTest();
        let correct = 0, answered = 0;
        test.questions.forEach((q, i) => {
          if (userAnswers[i] !== null && userAnswers[i] !== undefined) {
            answered++;
            if (userAnswers[i] === q.correct) correct++;
          }
        });
        const total = test.questions.length;
        const entry = {
          id: Date.now(),
          part: currentPart,
          testIndex: currentTestIndex,
          testId: test.id,
          correct,
          answered,
          total,
          time: new Date().toLocaleString('vi-VN'),
          elapsed: 1200 - timerSeconds
        };
        const history = getHistory();
        history.unshift(entry);
        if (history.length > 100) history.pop();
        localStorage.setItem('listening_history', JSON.stringify(history));
        renderHistory();
      }

      function renderHistory() {
        const history = getHistory();
        const list = $('#historyList');
        if (history.length === 0) {
          list.innerHTML = '<div class="history-empty">📭 Chưa có lịch sử làm bài nào<br><br><small>Hãy nộp bài để lưu kết quả!</small></div>';
          return;
        }
        list.innerHTML = history.map((h, i) => {
          const pct = h.total > 0 ? Math.round(h.correct / h.total * 100) : 0;
          const scoreClass = pct >= 70 ? '' : pct >= 50 ? 'medium' : 'poor';
          const elapsed = h.elapsed ? Math.floor(h.elapsed / 60) + 'p ' + (h.elapsed % 60) + 's' : '--';
          return `
            <div class="history-item" onclick="loadFromHistory(${i})">
              <div class="history-item-header">
                <span class="history-item-test">Part ${h.part} · Test ${h.testIndex + 1}</span>
                <span class="history-item-score ${scoreClass}">${h.correct}/${h.total} (${pct}%)</span>
              </div>
              <div class="history-item-meta">
                <span>⏰ ${h.time}</span>
                <span>⌛ ${elapsed}</span>
              </div>
              <button class="history-del" onclick="deleteHistory(event,${h.id})" title="Xóa mục này">🗑️</button>
            </div>
          `;
        }).join('');
      }

      window.loadFromHistory = function(idx) {
        const history = getHistory();
        const h = history[idx];
        if (!h) return;
        currentPart = h.part;
        currentTestIndex = h.testIndex;
        $('#partSelect').value = currentPart;
        populateTestSelect();
        loadTest();
        $('#historyPanel').classList.remove('open');
        showToast(`📂 Đã tải Part ${h.part} Test ${h.testIndex + 1}`, 'default', 2000);
      };

      window.deleteHistory = function(e, id) {
        e.stopPropagation();
        const history = getHistory().filter(h => h.id !== id);
        localStorage.setItem('listening_history', JSON.stringify(history));
        renderHistory();
        showToast('🗑️ Đã xóa mục lịch sử', 'default', 1500);
      };

      function clearAllHistory() {
        showModal('🗑️', 'Xóa tất cả lịch sử', 'Bạn có chắc muốn xóa toàn bộ lịch sử làm bài? Hành động này không thể hoàn tác.', 'Xóa tất cả', () => {
          localStorage.removeItem('listening_history');
          renderHistory();
          showToast('🗑️ Đã xóa toàn bộ lịch sử', 'danger', 2000);
        });
      }

      // ───────── PERSISTENCE ─────────
      function saveState() {
        const state = { currentPart, currentTestIndex, userAnswers, bookmarks, revealed, timerSeconds };
        localStorage.setItem('listening_app_state_v2', JSON.stringify(state));
      }
      function loadState() {
        const raw = localStorage.getItem('listening_app_state_v2') || localStorage.getItem('listening_app_state');
        if (!raw) return;
        try {
          const state = JSON.parse(raw);
          currentPart = state.currentPart || 2;
          currentTestIndex = state.currentTestIndex || 0;
          userAnswers = state.userAnswers || {};
          bookmarks = state.bookmarks || {};
          revealed = state.revealed || false;
          timerSeconds = state.timerSeconds || 1200;
        } catch(e) {}
      }

      // ───────── NAVIGATION ─────────
      function populateTestSelect() {
        const sel = $('#testSelect');
        sel.innerHTML = '';
        const total = currentPart === 1 ? part1Tests.length : part2Tests.length;
        for (let i = 1; i <= total; i++) {
          const opt = document.createElement('option');
          opt.value = i - 1;
          opt.textContent = 'Test ' + i;
          sel.appendChild(opt);
        }
        sel.value = currentTestIndex;
      }
      function loadTest() {
        stopAudio(); stopTimer();
        const test = getCurrentTest();
        userAnswers = {};
        bookmarks = {};
        revealed = false;
        currentFilter = 'all';
        test.questions.forEach((_, i) => { userAnswers[i] = null; bookmarks[i] = false; });
        $('#scriptPanel').classList.remove('show');
        $('#submitBtn').style.display = 'inline-flex';
        $('#reviewBtn').style.display = 'none';
        renderImagePanel();
        renderQuestionList();
        updateScore();
        startTimer();
        saveState();
        $('#partBadge').textContent = 'Part ' + currentPart;
        $('#partSelect').value = currentPart;
      }

      // ───────── DARK MODE ─────────
      function initDarkMode() {
        const toggle = $('#darkToggle');
        const saved = localStorage.getItem('dark_mode_v2');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (saved === 'light' || (!saved && !prefersDark)) {
          document.body.classList.add('light');
          toggle.textContent = '🌙';
        } else {
          toggle.textContent = '☀️';
        }
        toggle.onclick = () => {
          document.body.classList.toggle('light');
          const isLight = document.body.classList.contains('light');
          toggle.textContent = isLight ? '🌙' : '☀️';
          localStorage.setItem('dark_mode_v2', isLight ? 'light' : 'dark');
        };
      }

      // ───────── FULLSCREEN ─────────
      function initFullscreen() {
        $('#fullscreenBtn').addEventListener('click', () => {
          if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
          else document.exitFullscreen();
        });
      }

      // ───────── BIND EVENTS ─────────
      function bindEvents() {
        $('#partSelect').addEventListener('change', (e) => {
          currentPart = parseInt(e.target.value);
          currentTestIndex = 0;
          populateTestSelect();
          loadTest();
        });
        $('#testSelect').addEventListener('change', (e) => {
          currentTestIndex = parseInt(e.target.value);
          loadTest();
        });
        $('#playPauseBtn').addEventListener('click', togglePlayPause);
        $('#submitBtn').addEventListener('click', () => {
          const test = getCurrentTest();
          const answered = test.questions.filter((_, i) => userAnswers[i] !== null && userAnswers[i] !== undefined).length;
          const total = test.questions.length;
          if (answered < total) {
            showModal('⚠️', 'Còn câu chưa trả lời', `Bạn mới trả lời ${answered}/${total} câu. Bạn có muốn nộp bài không?`, '✅ Nộp bài', submitQuiz);
          } else {
            submitQuiz();
          }
        });
        $('#reviewBtn').addEventListener('click', () => {
          revealed = !revealed;
          renderQuestionList();
          $('#reviewBtn').textContent = revealed ? '📋 Ẩn đáp án' : '📋 Xem đáp án';
        });
        $('#resetBtn').addEventListener('click', () => {
          showModal('🔄', 'Làm lại bài?', 'Tất cả câu trả lời và đánh dấu sẽ bị xóa. Bạn có chắc muốn làm lại?', '🔄 Làm lại', resetQuiz);
        });
        $('#scriptToggleBtn').addEventListener('click', showScript);
        $('#seekSlider').addEventListener('input', () => { if (currentAudio) currentAudio.currentTime = $('#seekSlider').value; });
        $('#speedSelect').addEventListener('change', () => { if (currentAudio) currentAudio.playbackRate = parseFloat($('#speedSelect').value); });
        $('#volumeSlider').addEventListener('input', () => { if (currentAudio) currentAudio.volume = parseFloat($('#volumeSlider').value); });
        $('#rewindBtn').addEventListener('click', () => { if (currentAudio) currentAudio.currentTime = Math.max(0, currentAudio.currentTime - 5); });
        $('#forwardBtn').addEventListener('click', () => { if (currentAudio) currentAudio.currentTime = Math.min(currentAudio.duration || 0, currentAudio.currentTime + 5); });
        $('#loopBtn').addEventListener('click', () => {
          if (!currentAudio) return;
          if (!loopActive) {
            loopStart = currentAudio.currentTime; loopEnd = null; loopActive = true;
            $('#loopBtn').style.background = 'var(--primary-light)';
            showToast('🔁 Đã đặt điểm bắt đầu lặp', 'default', 1500);
          } else if (loopEnd === null) {
            loopEnd = currentAudio.currentTime;
            if (loopEnd < loopStart) { const tmp = loopStart; loopStart = loopEnd; loopEnd = tmp; }
            $('#loopBtn').style.background = 'var(--success-light)';
            showToast('🔁 Đang lặp đoạn đã chọn', 'success', 1500);
          } else {
            loopStart = null; loopEnd = null; loopActive = false;
            $('#loopBtn').style.background = '';
            showToast('🔁 Đã tắt lặp', 'default', 1000);
          }
        });

        // Filter events
        $('#filterAll').addEventListener('click', () => { currentFilter = 'all'; renderQuestionList(); });
        $('#filterUnanswered').addEventListener('click', () => { currentFilter = 'unanswered'; renderQuestionList(); });
        $('#filterBookmarked').addEventListener('click', () => { currentFilter = 'bookmarked'; renderQuestionList(); });

        // History panel
        $('#historyBtn').addEventListener('click', () => {
          renderHistory();
          $('#historyPanel').classList.toggle('open');
        });
        $('#historyClose').addEventListener('click', () => { $('#historyPanel').classList.remove('open'); });
        $('#clearAllHistory').addEventListener('click', clearAllHistory);

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
          if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;
          switch (e.key.toLowerCase()) {
            case ' ': e.preventDefault(); togglePlayPause(); break;
            case 'arrowleft': e.preventDefault(); if (currentAudio) currentAudio.currentTime = Math.max(0, currentAudio.currentTime - 5); break;
            case 'arrowright': e.preventDefault(); if (currentAudio) currentAudio.currentTime = Math.min(currentAudio.duration || 0, currentAudio.currentTime + 5); break;
            case 's': if (e.ctrlKey || e.metaKey) break; e.preventDefault(); showScript(); break;
            case 'r': if (e.ctrlKey || e.metaKey) break; e.preventDefault();
              showModal('🔄', 'Làm lại bài?', 'Tất cả câu trả lời và đánh dấu sẽ bị xóa.', '🔄 Làm lại', resetQuiz); break;
            case 'h': e.preventDefault(); renderHistory(); $('#historyPanel').classList.toggle('open'); break;
          }
        });
      }

      // ───────── INIT ─────────
      function init() {
        loadState();
        initDarkMode();
        initFullscreen();
        initZoom();
        populateTestSelect();
        $('#partSelect').value = currentPart;
        $('#partBadge').textContent = 'Part ' + currentPart;
        renderImagePanel();
        renderQuestionList();
        updateScore();
        bindEvents();
        startTimer();
        if (revealed) {
          $('#submitBtn').style.display = 'none';
          $('#reviewBtn').style.display = 'inline-flex';
          renderQuestionList();
        }
        updateTimerDisplay();
        renderHistory();
      }

      init();
    })();
  </script>
</body>
</html>
